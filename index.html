<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de Presupuesto Nu</title>
    <style>
        :root { --nu-purple: #820ad1; --nu-dark: #44066b; }
        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; background: #f4f4f9; }
        
        /* Columna Izquierda: Editor */
        .editor { width: 40%; background: white; padding: 25px; border-right: 2px solid #eee; overflow-y: auto; box-shadow: 5px 0 15px rgba(0,0,0,0.05); }
        
        /* Columna Derecha: Vista Previa */
        .preview { width: 60%; display: flex; align-items: center; justify-content: center; background: var(--nu-purple); background: linear-gradient(135deg, #820ad1 0%, #44066b 100%); }
        
        .preview-card { background: white; width: 80%; padding: 40px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }

        h2 { color: var(--nu-purple); margin-top: 0; }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #555; }
        input { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: var(--nu-purple); outline: none; }

        .gasto-row { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
        .btn-add { background: var(--nu-purple); color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 10px 0; transition: 0.2s; }
        .btn-add:hover { background: var(--nu-dark); }
        .btn-del { background: #ffeded; color: #ff4d4d; border: none; padding: 10px; border-radius: 8px; cursor: pointer; }

        /* Estilos de la Vista Previa */
        .stat-box { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #eee; }
        .total-final { font-size: 2.5em; font-weight: 800; color: var(--nu-purple); text-align: center; margin: 20px 0; }
        .label-total { text-align: center; color: #888; text-transform: uppercase; letter-spacing: 1px; font-size: 0.8em; }
    </style>
</head>
<body>

<div class="editor">
    <h2>⚙️ Configuración</h2>
    <div class="input-group">
        <label>Sueldo Neto ($)</label>
        <input type="number" id="sueldoBase" placeholder="2500000" oninput="actualizar()">
    </div>

    <label>Gastos Mensuales</label>
    <div id="contenedorGastos"></div>
    <button class="btn-add" onclick="agregarGasto()">+ Nuevo Gasto</button>
    
    <div style="margin-top: 30px; font-size: 12px; color: #aaa;">
        * Los cambios se guardan automáticamente en este navegador.
    </div>
</div>

<div class="preview">
    <div class="preview-card">
        <div class="label-total">Saldo Disponible</div>
        <div class="total-final" id="saldoFinal">$ 0</div>
        
        <div class="stat-box">
            <span>Ingresos Totales</span>
            <span id="ingresoVista" style="font-weight: bold;">$ 0</span>
        </div>
        <div class="stat-box">
            <span>Gastos Acumulados</span>
            <span id="gastosVista" style="color: #ff4d4d; font-weight: bold;">$ 0</span>
        </div>
    </div>
</div>

<script>
    window.onload = function() {
        const salvado = JSON.parse(localStorage.getItem('nu_budget_v2'));
        if (salvado) {
            document.getElementById('sueldoBase').value = salvado.sueldo;
            salvado.gastos.forEach(g => agregarGasto(g.nombre, g.monto, g.color));
        } else {
            agregarGasto("Arriendo", 1000000, "#820ad1");
        }
        actualizar();
    };

    function agregarGasto(nom = "", mon = "", col = "#820ad1") {
        const div = document.createElement('div');
        div.className = 'gasto-row';
        div.innerHTML = `
            <input type="text" placeholder="Gasto" value="${nom}" oninput="actualizar()" style="flex:2">
            <input type="number" placeholder="$" value="${mon}" oninput="actualizar()" class="monto" style="flex:1">
            <input type="color" value="${col}" oninput="actualizar()" style="width:40px; padding:2px; height:42px; border:none">
            <button class="btn-del" onclick="this.parentElement.remove(); actualizar()">✕</button>
        `;
        document.getElementById('contenedorGastos').appendChild(div);
    }

    function actualizar() {
        const sueldo = parseFloat(document.getElementById('sueldoBase').value) || 0;
        const filas = document.querySelectorAll('.gasto-row');
        let totalG = 0;
        let listaG = [];

        filas.forEach(f => {
            const n = f.querySelectorAll('input')[0].value;
            const m = parseFloat(f.querySelectorAll('input')[1].value) || 0;
            const c = f.querySelectorAll('input')[2].value;
            totalG += m;
            listaG.push({nombre: n, monto: m, color: c});
            f.style.borderLeft = `5px solid ${c}`;
        });

        const saldo = sueldo - totalG;

        // Mostrar en la columna derecha
        document.getElementById('saldoFinal').innerText = '$ ' + saldo.toLocaleString('es-CO');
        document.getElementById('ingresoVista').innerText = '$ ' + sueldo.toLocaleString('es-CO');
        document.getElementById('gastosVista').innerText = '$ ' + totalG.toLocaleString('es-CO');
        
        document.getElementById('saldoFinal').style.color = saldo < 0 ? "#ff4d4d" : "#820ad1";

        // Guardar
        localStorage.setItem('nu_budget_v2', JSON.stringify({sueldo, gastos: listaG}));
    }
</script>

</body>
</html>
