<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Sincronizada Hernán</title>
    
    <!-- ✅ Firebase SDK v8 (Compat) - Carga correcta -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <style>
        :root { --primary-color: #2c3e50; --bg-color: #f0f2f5; --card-bg: #ffffff; --danger: #e74c3c; --success: #27ae60; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); margin: 0; padding: 0; padding-bottom: 100px; }
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: white; z-index: 3000; transition: 0.3s; padding: 25px; box-sizing: border-box; box-shadow: 10px 0 30px rgba(0,0,0,0.1); }
        .sidebar.active { left: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 2500; display: none; }
        .overlay.active { display: block; }
        .top-banner { background: var(--primary-color); padding: 50px 20px; color: white; text-align: center; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; position: relative; }
        .menu-btn { position: absolute; left: 20px; top: 20px; font-size: 28px; cursor: pointer; }
        .save-indicator { position: absolute; right: 20px; top: 25px; font-size: 11px; background: rgba(0,0,0,0.3); padding: 4px 10px; border-radius: 10px; }
        .header-income input { background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.3); border-radius: 15px; color: white; font-size: 2rem; font-weight: 800; text-align: center; width: 85%; max-width: 380px; padding: 10px; outline: none; }
        .container { max-width: 1000px; margin: -25px auto 0; padding: 0 15px; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .dashboard { grid-template-columns: 1fr; } }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); min-height: 150px; }
        .item-row { display: flex; gap: 10px; background: #f8f9fa; padding: 12px; border-radius: 12px; margin-bottom: 10px; align-items: center; border-left: 6px solid #ccc; }
        .item-row input { background: transparent; border: none; font-weight: 600; outline: none; }
        .btn-add { background: var(--primary-color); color: white; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; font-size: 20px; }
        .input-color-box { width: 35px; height: 35px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; background: white; }
        .footer-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 500px; background: white; border-radius: 25px; display: flex; justify-content: space-around; align-items: center; height: 85px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); z-index: 2000; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="sidebar" id="sidebar">
    <h3 style="color:var(--primary-color)">AJUSTES</h3>
    <label>Color de Interfaz:</label><br>
    <input type="color" id="themePicker" oninput="onUserInput()" style="width:100%; height:40px; margin:10px 0; border:none; cursor:pointer;">
    <button onclick="resetApp()" style="background:var(--danger); color:white; border:none; width:100%; padding:10px; border-radius:8px; cursor:pointer; margin-top:20px;">Borrar Todo</button>
</div>

<div class="top-banner">
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    <div class="save-indicator" id="saveIcon">Conectando...</div>
    <div class="header-income">
        <label>CALCULADORA DE GASTOS</label><br>
        <input type="number" id="sueldoBase" placeholder="Sueldo Neto" oninput="onUserInput()">
    </div>
</div>

<div class="container">
    <div class="dashboard">
        <div class="card">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <strong style="color:var(--danger)">DEUDAS</strong>
                <button class="btn-add" onclick="addItem('deudas')">+</button>
            </div>
            <div id="listaDeudas"></div>
        </div>
        <div class="card">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <strong style="color:var(--success)">AHORROS</strong>
                <button class="btn-add" onclick="addItem('ahorros')">+</button>
            </div>
            <div id="listaAhorros"></div>
        </div>
    </div>
</div>

<div class="footer-nav">
    <div style="text-align:center"><span>GASTOS</span><br><strong id="resGasto" style="color:var(--danger)">$ 0</strong></div>
    <div style="text-align:center"><span>NETO</span><br><strong id="resDisponible" style="font-size: 1.4rem;">$ 0</strong></div>
    <div style="text-align:center"><span>AHORROS</span><br><strong id="resAhorro" style="color:var(--success)">$ 0</strong></div>
</div>

<script>
    // --- CONFIGURACIÓN FIREBASE ---
    var firebaseConfig = {
        apiKey: "AIzaSyCLb7LaJypnUHQ0TKZ2aTRNK4yAa6SUiZE",
        authDomain: "calculadoramensualsueldo.firebaseapp.com",
        projectId: "calculadoramensualsueldo",
        storageBucket: "calculadoramensualsueldo.appspot.com",
        messagingSenderId: "619721076451",
        appId: "1:619721076451:web:56925f6251a3ba53ad5fd6"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    var db = firebase.firestore();

    // --- ESTADO GLOBAL ---
    var isUpdatingFromDB = false;
    var saveTimeout;
    var docRef = db.collection("usuarios").doc("datos"); // ⚠️ Ver nota de seguridad abajo

    // ✅ LISTENER EN TIEMPO REAL (Sincroniza PC ↔ Celular al instante)
    docRef.onSnapshot((doc) => {
        if (doc.exists) {
            isUpdatingFromDB = true;
            var data = doc.data();
            
            document.getElementById('sueldoBase').value = data.sueldo ?? "";
            if(data.temaColor) {
                document.documentElement.style.setProperty('--primary-color', data.temaColor);
                document.getElementById('themePicker').value = data.temaColor;
            }
            
            // Limpiar y reconstruir listas sin activar eventos de escritura
            document.getElementById('listaDeudas').innerHTML = '';
            document.getElementById('listaAhorros').innerHTML = '';
            
            if(data.deudas) data.deudas.forEach(d => addItem('deudas', d.nombre, d.monto, d.color, true));
            if(data.ahorros) data.ahorros.forEach(a => addItem('ahorros', a.nombre, a.monto, a.color, true));
            
            calculateTotals();
            isUpdatingFromDB = false;
            document.getElementById('saveIcon').innerText = "✅ Sincronizado";
        } else {
            document.getElementById('saveIcon').innerText = "📡 Esperando datos...";
        }
    }, (error) => {
        console.error("Error de sincronización:", error);
        document.getElementById('saveIcon').innerText = "❌ Sin conexión";
    });

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    function addItem(type, nombre = '', monto = '', color = '#820ad1', fromDB = false) {
        const container = document.getElementById(type === 'deudas' ? 'listaDeudas' : 'listaAhorros');
        const div = document.createElement('div');
        div.className = 'item-row';
        div.style.borderLeftColor = color;
        // ✅ Solo llama a onUserInput() si NO viene de la BD (evita bucles)
        const inputEvent = fromDB ? '' : 'oninput="onUserInput()"';
        div.innerHTML = `
            <span class="dot" style="color: ${color}; font-size: 20px;">■</span>
            <input type="text" class="inp-nom" placeholder="Nombre" value="${nombre}" ${inputEvent} style="flex:2">
            <input type="number" class="inp-mon" placeholder="0" value="${monto}" ${inputEvent} style="flex:1; text-align: right;">
            <input type="color" class="inp-col input-color-box" value="${color}" ${inputEvent} style="width:35px;height:35px;border:1px solid #ddd;border-radius:8px;cursor:pointer;">
            <button onclick="this.parentElement.remove(); onUserInput()" style="background:none; border:none; color:#ccc; cursor:pointer;">✕</button>
        `;
        container.appendChild(div);
    }

    function onUserInput() {
        if (isUpdatingFromDB) return; // Bloquea escrituras durante sincronización entrante
        calculateTotals();
        
        document.getElementById('saveIcon').innerText = "☁️ Guardando...";
        clearTimeout(saveTimeout);
        
        saveTimeout = setTimeout(() => {
            const theme = getComputedStyle(document.documentElement).getPropertyValue('--primary-color').trim();
            docRef.set({
                sueldo: parseFloat(document.getElementById('sueldoBase').value) || 0,
                temaColor: theme,
                deudas: getItemsArray('deudas'),
                ahorros: getItemsArray('ahorros'),
                ultimaActualizacion: firebase.firestore.FieldValue.serverTimestamp()
            }).catch(err => {
                document.getElementById('saveIcon').innerText = "❌ Error al guardar";
                console.error(err);
            });
        }, 800); // Debounce de 800ms
    }

    function calculateTotals() {
        const sueldo = parseFloat(document.getElementById('sueldoBase').value) || 0;
        let g = 0, a = 0;
        document.querySelectorAll('#listaDeudas .inp-mon').forEach(i => g += parseFloat(i.value) || 0);
        document.querySelectorAll('#listaAhorros .inp-mon').forEach(i => a += parseFloat(i.value) || 0);
        const disp = sueldo - g - a;
        
        document.getElementById('resGasto').innerText = `$ ${g.toLocaleString()}`;
        document.getElementById('resAhorro').innerText = `$ ${a.toLocaleString()}`;
        document.getElementById('resDisponible').innerText = `$ ${disp.toLocaleString()}`;
        document.getElementById('resDisponible').style.color = disp < 0 ? "var(--danger)" : "var(--success)";
    }

    function getItemsArray(type) {
        const listId = type === 'deudas' ? 'listaDeudas' : 'listaAhorros';
        return Array.from(document.querySelectorAll(`#${listId} .item-row`)).map(r => ({
            nombre: r.querySelector('.inp-nom').value,
            monto: parseFloat(r.querySelector('.inp-mon').value) || 0,
            color: r.querySelector('.inp-col').value
        }));
    }

    function resetApp() {
        if(confirm("¿Borrar todos los datos? Esta acción es irreversible.")) {
            docRef.delete().then(() => location.reload()).catch(err => alert("Error: " + err.message));
        }
    }
</script>
</body>
</html>
