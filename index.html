<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora_Mensual_sueldo</title>
    <style>
        :root {
            --nu-purple: #820ad1;
            --nu-dark: #44066b;
            --bg-color: #f4f4f9;
            --danger: #ff4d4d;
            --success: #28a745;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            padding-bottom: 100px; /* Espacio para la barra fija inferior */
        }

        .container { max-width: 1100px; margin: 0 auto; }

        /* HEADER CON SUELDO */
        .header-income {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin-bottom: 25px;
            text-align: center;
            border-top: 6px solid var(--nu-purple);
        }

        .header-income label { display: block; font-weight: bold; margin-bottom: 10px; color: #555; }
        .header-income input { 
            font-size: 2rem; 
            width: 80%; 
            max-width: 400px; 
            text-align: center; 
            border: 2px solid #eee; 
            border-radius: 15px;
            color: var(--nu-purple);
            font-weight: 800;
        }

        /* DASHBOARD RESPONSIVO */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr; /* 2 columnas en PC */
            gap: 20px;
        }

        @media (max-width: 768px) {
            .dashboard { grid-template-columns: 1fr; } /* 1 columna en móvil */
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .card-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px;
        }

        .item-row {
            display: flex; gap: 8px; margin-bottom: 10px;
            padding: 8px; border-radius: 10px; background: #fafafa;
            border-left: 6px solid #ccc;
        }

        .item-row input { padding: 8px; border: 1px solid #ddd; border-radius: 8px; }
        .input-name { flex: 2; }
        .input-amount { flex: 1; }

        /* BARRA INFERIOR FIJA */
        .footer-status {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: var(--nu-dark);
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-around;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.2);
            z-index: 1000;
        }

        .status-item { text-align: center; }
        .status-item span { display: block; font-size: 0.8rem; opacity: 0.8; }
        .status-item strong { font-size: 1.2rem; }
        .disponible-val { color: #00ff88; font-size: 1.5rem !important; }

        .btn-add { background: var(--nu-purple); color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; }
        .btn-del { background: none; border: none; color: var(--danger); cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-income">
        <label>💰 INGRESOS/GASTOS</label>
        <input type="number" id="sueldoBase" placeholder="Ej: 3000000" oninput="updateAll()">
    </div>

    <div class="dashboard">
        <!-- SECCIÓN GASTOS / DEUDAS -->
        <div class="card">
            <div class="card-header">
                <strong style="color: var(--danger)">📉 Gastos y Deudas</strong>
                <button class="btn-add" onclick="addItem('deudas')">+ Gasto</button>
            </div>
            <div id="listaDeudas"></div>
        </div>

        <!-- SECCIÓN AHORROS -->
        <div class="card">
            <div class="card-header">
                <strong style="color: var(--success)">💎 Mis Ahorros</strong>
                <button class="btn-add" onclick="addItem('ahorros')">+ Ahorro</button>
            </div>
            <div id="listaAhorros"></div>
        </div>
    </div>
</div>

<!-- BARRA DE RESULTADOS INFERIOR -->
<div class="footer-status">
    <div class="status-item">
        <span>Total Gastos</span>
        <strong id="resGasto" style="color: var(--danger)">$ 0</strong>
    </div>
    <div class="status-item">
        <span>Total Ahorros</span>
        <strong id="resAhorro" style="color: var(--success)">$ 0</strong>
    </div>
    <div class="status-item">
        <span>DINERO DISPONIBLE</span>
        <strong id="resDisponible" class="disponible-val">$ 0</strong>
    </div>
</div>

<script>
    window.onload = () => {
        const data = JSON.parse(localStorage.getItem('nu_smart_v1'));
        if (data) {
            document.getElementById('sueldoBase').value = data.sueldo;
            data.deudas.forEach(d => addItem('deudas', d.nombre, d.monto, d.color));
            data.ahorros.forEach(a => addItem('ahorros', a.nombre, a.monto, a.color));
        } else {
            addItem('deudas', 'Arriendo', 1000000, '#ff4d4d');
            addItem('ahorros', 'Cajita Nu', 200000, '#820ad1');
        }
        updateAll();
    };

    function addItem(type, nombre = '', monto = '', color = '#820ad1') {
        const container = document.getElementById(type === 'deudas' ? 'listaDeudas' : 'listaAhorros');
        const div = document.createElement('div');
        div.className = 'item-row';
        div.style.borderLeftColor = color;
        div.innerHTML = `
            <input type="text" class="input-name" placeholder="Nombre" value="${nombre}" oninput="updateAll()">
            <input type="number" class="input-amount" placeholder="$" value="${monto}" oninput="updateAll()">
            <input type="color" value="${color}" oninput="this.parentElement.style.borderLeftColor = this.value; updateAll()">
            <button class="btn-del" onclick="this.parentElement.remove(); updateAll()">✕</button>
        `;
        container.appendChild(div);
    }

    function updateAll() {
        const sueldo = parseFloat(document.getElementById('sueldoBase').value) || 0;
        
        const deudas = sumItems('listaDeudas');
        const ahorros = sumItems('listaAhorros');
        
        // El dinero disponible es: Sueldo - Gastos - Ahorros (porque el ahorro sale de tu sueldo)
        const disponible = sueldo - deudas - ahorros;

        // Actualizar Footer
        document.getElementById('resGasto').innerText = `$ ${deudas.toLocaleString('es-CO')}`;
        document.getElementById('resAhorro').innerText = `$ ${ahorros.toLocaleString('es-CO')}`;
        document.getElementById('resDisponible').innerText = `$ ${disponible.toLocaleString('es-CO')}`;
        
        // Alerta visual si te quedas sin dinero
        document.getElementById('resDisponible').style.color = disponible < 0 ? "#ff4d4d" : "#00ff88";

        save();
    }

    function sumItems(id) {
        let t = 0;
        document.getElementById(id).querySelectorAll('.input-amount').forEach(i => t += parseFloat(i.value) || 0);
        return t;
    }

    function save() {
        const data = {
            sueldo: document.getElementById('sueldoBase').value,
            deudas: getItems('listaDeudas'),
            ahorros: getItems('listaAhorros')
        };
        localStorage.setItem('nu_smart_v1', JSON.stringify(data));
    }

    function getItems(id) {
        return Array.from(document.getElementById(id).querySelectorAll('.item-row')).map(r => ({
            nombre: r.querySelector('.input-name').value,
            monto: r.querySelector('.input-amount').value,
            color: r.querySelector('input[type="color"]').value
        }));
    }
</script>

</body>
</html>
