<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Budget Pro | Dashboard</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
            color: var(--text-main);
            margin: 0;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 5px;
            background: linear-gradient(to right, #fff, var(--text-dim));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Tarjeta de Ingreso Principal */
        .income-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 25px;
            text-align: center;
        }

        .income-card label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .income-card input {
            background: transparent;
            border: none;
            color: white;
            font-size: 2rem;
            font-weight: 700;
            text-align: center;
            width: 100%;
            outline: none;
        }

        /* Listado de Gastos */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 0 10px;
        }

        .btn-add {
            background: var(--primary);
            color: white;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: var(--transition);
        }

        .btn-add:hover { transform: scale(1.1); background: var(--secondary); }

        /* FILA DE GASTO (ESTILO MEJORADO) */
        .item-group {
            margin-bottom: 15px;
        }

        .item-row {
            display: grid;
            grid-template-columns: 6px 1fr auto auto 30px;
            align-items: center;
            gap: 12px;
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            padding: 12px 15px;
            border-radius: 18px;
            transition: var(--transition);
        }

        /* Selector de color como línea fina */
        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 6px;
            height: 35px;
            cursor: pointer;
            background: none;
            padding: 0;
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 10px; }

        .input-name {
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 0.95rem;
            outline: none;
            width: 100%;
        }

        /* Selector de Categoría Corregido */
        select {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 4px 8px;
            font-size: 0.8rem;
            outline: none;
            cursor: pointer;
        }

        select option {
            background-color: #1e293b; /* Fondo oscuro para que se vea la letra */
            color: white;
        }

        .input-amount {
            background: transparent;
            border: none;
            color: var(--primary);
            font-weight: 700;
            width: 70px;
            text-align: right;
            outline: none;
        }

        .btn-remove {
            background: transparent;
            color: var(--text-dim);
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            transition: var(--transition);
        }

        .btn-remove:hover { color: #ef4444; }

        /* Barra de progreso sutil */
        .progress-container {
            width: calc(100% - 20px);
            height: 3px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            margin: -5px auto 0;
            overflow: hidden;
        }

        .progress-bar {
            width: 35%; /* Ejemplo */
            height: 100%;
            background: var(--primary);
            border-radius: 10px;
        }

        /* Footer Nav */
        .bottom-stats {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .stat-item span {
            display: block;
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .stat-item strong {
            font-size: 1.1rem;
            color: var(--text-main);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Smart Budget</h1>
            <p style="color: var(--text-dim); font-size: 0.9rem;">Controla tus finanzas con estilo</p>
        </header>

        <div class="income-card">
            <label>Ingresos Totales</label>
            <input type="number" value="5000" id="mainIncome" step="100">
        </div>

        <div class="section-header">
            <h3 style="margin:0; font-size: 1.1rem;">Gastos Mensuales</h3>
            <button class="btn-add" onclick="addNewExpense()">+</button>
        </div>

        <div id="expenseList">
            <div class="item-group">
                <div class="item-row">
                    <input type="color" value="#6366f1">
                    <input type="text" class="input-name" placeholder="Nombre" value="Arriendo">
                    <select>
                        <option>🏠 Vivienda</option>
                        <option>🍔 Comida</option>
                        <option>🚗 Transporte</option>
                        <option>🎮 Ocio</option>
                    </select>
                    <input type="number" class="input-amount" value="1200">
                    <button class="btn-remove" onclick="this.parentElement.parentElement.remove()">✕</button>
                </div>
                <div class="progress-container">
                    <div class="progress-bar" style="width: 60%; background: #6366f1;"></div>
                </div>
            </div>
        </div>
    </div>

    <nav class="bottom-stats">
        <div class="stat-item">
            <span>Gastado</span>
            <strong id="totalSpent">$1,200</strong>
        </div>
        <div class="stat-item" style="text-align: right;">
            <span>Disponible</span>
            <strong style="color: #10b981;" id="totalAvailable">$3,800</strong>
        </div>
    </nav>

    <script>
        function addNewExpense() {
            const list = document.getElementById('expenseList');
            const newGroup = document.createElement('div');
            newGroup.className = 'item-group';
            
            newGroup.innerHTML = `
                <div class="item-row">
                    <input type="color" value="#a855f7">
                    <input type="text" class="input-name" placeholder="Nuevo gasto">
                    <select>
                        <option>📌 General</option>
                        <option>🏠 Vivienda</option>
                        <option>🍔 Comida</option>
                        <option>🚗 Transporte</option>
                        <option>🎮 Ocio</option>
                    </select>
                    <input type="number" class="input-amount" value="0">
                    <button class="btn-remove" onclick="this.parentElement.parentElement.remove()">✕</button>
                </div>
                <div class="progress-container">
                    <div class="progress-bar" style="width: 0%; background: #a855f7;"></div>
                </div>
            `;
            list.appendChild(newGroup);
        }

        // Aquí podrías agregar una función que recorra todos los .input-amount 
        // y actualice los totales en el nav de abajo automáticamente.
    </script>
</body>
</html>
