<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Gastos Mensuales</title>
    <!-- Firebase SDK (Versiones Compatibles) -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    
    <style>
        :root {
            --primary-color: #2c3e50;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #333;
            --danger: #e74c3c;
            --success: #27ae60;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 0; color: var(--text-main);
        }

        /* MENU LATERAL */
        .sidebar {
            position: fixed; left: -280px; top: 0; width: 280px; height: 100%;
            background: var(--card-bg); z-index: 3000; transition: 0.3s ease;
            box-shadow: 10px 0 30px rgba(0,0,0,0.1); padding: 30px; box-sizing: border-box;
        }
        .sidebar.active { left: 0; }
        .sidebar-header { font-weight: 800; color: var(--primary-color); border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }
        
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 2500; display: none; }
        .overlay.active { display: block; }

        /* HEADER */
        .top-banner {
            background: var(--primary-color);
            padding: 50px 20px; color: white; text-align: center;
            border-bottom-left-radius: 30px; border-bottom-right-radius: 30px;
            position: relative; transition: 0.3s;
        }

        .menu-btn { position: absolute; left: 20px; top: 20px; font-size: 28px; cursor: pointer; }
        
        .save-indicator { 
            position: absolute; right: 20px; top: 25px; font-size: 12px; opacity: 0.8; 
            background: rgba(0,0,0,0.2); padding: 5px 10px; border-radius: 10px;
        }

        .header-income input {
            background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.3);
            border-radius: 15px; color: white; font-size: 2rem; font-weight: 800;
            text-align: center; width: 85%; max-width: 380px; padding: 10px; outline: none;
        }

        .container { max-width: 1000px; margin: -25px auto 120px; padding: 0 15px; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .dashboard { grid-template-columns: 1fr; } }

        .card { background: var(--card-bg); padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        /* FILAS DE GASTOS CON PALETA INDIVIDUAL */
        .item-row { 
            display: flex; gap: 10px; background: #f8f9fa; padding: 12px; 
            border-radius: 12px; margin-bottom: 10px; align-items: center;
            border-left: 6px solid #ccc; /* Color individual */
        }
        .item-row input { background: transparent; border: none; font-weight: 600; outline: none; width: 100%; }
        
        .btn-add { 
            background: var(--primary-color); color: white; border: none; 
            width: 35px; height: 35px; border-radius: 50%; cursor: pointer; font-size: 20px;
        }

        /* BARRA INFERIOR */
        .footer-nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 500px; background: white; border-radius: 25px;
            display: flex; justify-content: space-around; align-items: center;
            height: 85px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); z-index: 2000;
        }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">AJUSTES</div>
    <div style="margin-bottom: 20px;">
        <label>Color de Interfaz:</label><br>
        <input type="color" id="themePicker" oninput="changeUITheme(this.value)" style="width:100%; height:40px; border:none; cursor:pointer; margin-top:10px;">
    </div>
    <button onclick="resetApp()" style="background:var(--danger); color:white; border:none; width:100%; padding:10px; border-radius:8px; cursor:pointer;">Reiniciar Todo</button>
</div>

<div class="top-banner">
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    <div class="save-indicator" id="saveIcon">Sincronizado</div>
    <div class="header-income">
        <label>CALCULADORA DE GASTOS</label><br>
        <input type="number" id="sueldoBase" placeholder="Sueldo Neto" oninput="updateAll()">
    </div>
</div>

<div class="container">
    <div class="dashboard">
        <div class="card">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <strong style="color:var(--danger)">DEUDAS</strong>
                <button class="btn-add" onclick="addItem('deudas')">+</button>
            </div>
            <div id="listaDeudas"></div>
        </div>
        <div class="card">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <strong style="color:var(--success)">AHORROS</strong>
                <button class="btn-add" onclick="addItem('ahorros')">+</button>
            </div>
            <div id="listaAhorros"></div>
        </div>
    </div>
</div>

<div class="footer-nav">
    <div style="text-align:center"><span>GASTOS</span><br><strong id="resGasto" style="color:var(--danger)">$ 0</strong></div>
    <div style="text-align:center"><span>NETO</span><br><strong id="resDisponible" style="font-size: 1.4rem;">$ 0</strong></div>
    <div style="text-align:center"><span>AHORROS</span><br><strong id="resAhorro" style="color:var(--success)">$ 0</strong></div>
</div>

<script>
    // --- USA TUS CREDENCIALES REALES ---
    const firebaseConfig = {
        apiKey: "AIzaSyCLb7LaJypnUHQ0TKZ2aTRNK4yAa6SUiZE",
        authDomain: "://firebaseapp.com",
        projectId: "calculadoramensualsueldo",
        storageBucket: "calculadoramensualsueldo.firebasestorage.app",
        messagingSenderId: "619721076451",
        appId: "1:619721076451:web:56925f6251a3ba53ad5fd6"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const docRef = db.collection("usuarios").doc("presupuesto_hernan");

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    function changeUITheme(color) {
        document.documentElement.style.setProperty('--primary-color', color);
        updateAll();
    }

    function addItem(type, nombre = '', monto = '', color = '#820ad1') {
        const container = document.getElementById(type === 'deudas' ? 'listaDeudas' : 'listaAhorros');
        const div = document.createElement('div');
        div.className = 'item-row';
        div.style.borderLeftColor = color;
        div.innerHTML = `
            <input type="color" value="${color}" oninput="this.parentElement.style.borderLeftColor = this.value; updateAll()" style="width:25px; height:25px; border:none; background:none; cursor:pointer;">
            <input type="text" placeholder="Nombre" value="${nombre}" oninput="updateAll()" style="flex:2">
            <input type="number" placeholder="0" value="${monto}" oninput="updateAll()" style="flex:1">
            <button onclick="this.parentElement.remove(); updateAll()" style="background:none; border:none; color:#ccc; cursor:pointer;">✕</button>
        `;
        container.appendChild(div);
    }

    function updateAll() {
        const sueldo = parseFloat(document.getElementById('sueldoBase').value) || 0;
        let g = 0, a = 0;
        document.querySelectorAll('#listaDeudas input[type="number"]').forEach(i => g += parseFloat(i.value) || 0);
        document.querySelectorAll('#listaAhorros input[type="number"]').forEach(i => a += parseFloat(i.value) || 0);
        
        const disp = sueldo - g - a;
        document.getElementById('resGasto').innerText = `$ ${g.toLocaleString()}`;
        document.getElementById('resAhorro').innerText = `$ ${a.toLocaleString()}`;
        document.getElementById('resDisponible').innerText = `$ ${disp.toLocaleString()}`;
        document.getElementById('resDisponible').style.color = disp < 0 ? "var(--danger)" : "var(--success)";

        document.getElementById('saveIcon').innerText = "Guardando...";

        clearTimeout(window.sT);
        window.sT = setTimeout(() => {
            const colorApp = getComputedStyle(document.documentElement).getPropertyValue('--primary-color').trim();
            docRef.set({
                sueldo,
                temaColor: colorApp,
                deudas: getItemsData('listaDeudas'),
                ahorros: getItemsData('listaAhorros')
            }).then(() => {
                document.getElementById('saveIcon').innerText = "Sincronizado";
            });
        }, 1200);
    }

    function getItemsData(id) {
        return Array.from(document.getElementById(id).querySelectorAll('.item-row')).map(r => ({
            nombre: r.querySelector('input').value,
            monto: r.querySelector('input[type="number"]').value,
            color: r.querySelector('input[type="color"]').value
        }));
    }

    window.onload = async () => {
        const doc = await docRef.get();
        if (doc.exists) {
            const data = doc.data();
            document.getElementById('sueldoBase').value = data.sueldo || "";
            if(data.temaColor) {
                document.documentElement.style.setProperty('--primary-color', data.temaColor);
                document.getElementById('themePicker').value = data.temaColor;
            }
            if(data.deudas) data.deudas.forEach(d => addItem('deudas', d.nombre, d.monto, d.color));
            if(data.ahorros) data.ahorros.forEach(a => addItem('ahorros', a.nombre, a.monto, a.color));
        }
        updateAll();
    };

    function resetApp() {
        if(confirm("¿Borrar todo?")) docRef.set({sueldo:0, deudas:[], ahorros:[], temaColor:'#2c3e50'}).then(()=>location.reload());
    }
</script>
</body>
</html>
