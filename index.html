<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Budget Pro v3.0</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --accent: #f43f5e;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            margin: 0;
            padding-bottom: 120px;
            overflow-x: hidden;
        }

        /* Menu Sidebar */
        .sidebar {
            position: fixed;
            left: -300px;
            top: 0;
            width: 260px;
            height: 100%;
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(20px);
            z-index: 3000;
            padding: 40px 25px;
            transition: var(--transition);
            border-right: 1px solid var(--glass-border);
        }
        .sidebar.active { left: 0; }
        .sidebar h2 { font-weight: 800; margin-bottom: 30px; }
        .sidebar-item { padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.2s; }
        .sidebar-item:hover { color: var(--primary); }

        /* Banner de Ingreso */
        .top-banner {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            padding: 60px 20px 80px;
            border-radius: 0 0 50px 50px;
            text-align: center;
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .menu-btn { position: absolute; left: 25px; top: 30px; font-size: 28px; cursor: pointer; }

        .income-display {
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            color: white;
            font-size: 2.8rem;
            font-weight: 800;
            width: 280px;
            text-align: center;
            padding: 15px;
            outline: none;
            transition: var(--transition);
        }
        .income-display:focus { transform: scale(1.05); border-color: white; }

        .container {
            max-width: 600px;
            margin: -40px auto 0;
            padding: 0 20px;
        }

        /* Grid de Estadísticas */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 25px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        /* Área de Gráfico */
        .chart-section {
            background: var(--card-bg);
            border-radius: 35px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Listado de Gastos Dinámico */
        .expense-row {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 22px;
            padding: 15px 20px;
            margin-bottom: 15px;
            display: grid;
            grid-template-columns: 10px 1fr auto auto 30px;
            align-items: center;
            gap: 15px;
            transition: var(--transition);
        }

        /* Selector de Color (Línea Fina) */
        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 10px;
            height: 45px;
            background: none;
            cursor: pointer;
            padding: 0;
        }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 12px; }

        .input-text, .input-num, select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid transparent;
            color: white;
            border-radius: 12px;
            padding: 10px;
            outline: none;
            font-size: 0.95rem;
        }
        select option { background: #0f172a; color: white; }
        .input-num { width: 90px; font-weight: 800; color: var(--primary); text-align: right; }

        /* Barra de Progreso de Fila */
        .progress-container {
            grid-column: 1 / -1;
            height: 5px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-bar { height: 100%; width: 0%; transition: width 0.6s ease; }

        /* Botón Flotante */
        .add-fab {
            position: fixed;
            bottom: 120px;
            right: 30px;
            background: var(--primary);
            width: 65px; height: 65px;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: white;
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.5);
            cursor: pointer;
            z-index: 1000;
            transition: var(--transition);
        }
        .add-fab:hover { transform: translateY(-5px) rotate(90deg); }

        /* Navegación Inferior */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(30px);
            border-top: 1px solid var(--glass-border);
            padding: 25px 0;
            display: flex;
            justify-content: space-around;
            z-index: 2000;
        }
        .bottom-nav span { display: block; font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 5px; }
        .bottom-nav strong { font-size: 1.3rem; }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <h2>Smart Budget</h2>
        <div class="sidebar-item" onclick="syncData()">🔄 Sincronizar con Firestore</div>
        <div class="sidebar-item" onclick="exportJSON()">📥 Exportar Respaldo</div>
        <div class="sidebar-item" onclick="toggleTheme()">🌓 Cambiar Tema</div>
        <div class="sidebar-item" style="color: var(--accent); margin-top: 20px;" onclick="resetAll()">🗑️ Resetear Datos</div>
    </div>

    <div class="top-banner">
        <div class="menu-btn" onclick="toggleSidebar()">☰</div>
        <span style="font-size: 0.9rem; font-weight: 700; opacity: 0.9;">PRESUPUESTO DEL MES</span><br>
        <input type="number" class="income-display" id="globalIncome" value="0" oninput="updateCore()">
    </div>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <span>TOTAL GASTOS</span>
                <div id="spentVal" style="color: var(--accent); font-size: 1.8rem; font-weight: 800;">$0</div>
            </div>
            <div class="stat-card">
                <span>EFECTIVO LIBRE</span>
                <div id="freeVal" style="color: #10b981; font-size: 1.8rem; font-weight: 800;">$0</div>
            </div>
        </div>

        <div class="chart-section">
            <canvas id="budgetChart" width="250" height="250"></canvas>
            <p id="savingsTip" style="margin-top: 20px; font-size: 0.9rem; color: var(--text-dim); text-align: center;"></p>
        </div>

        <div id="expenseMaster">
            </div>
    </div>

    <div class="add-fab" onclick="addExpenseRow()">+</div>

    <nav class="bottom-nav">
        <div style="text-align: center;"><span>Meta Ahorro (10%)</span><strong id="goalVal">$0</strong></div>
        <div style="text-align: center;"><span>Capacidad Uso</span><strong id="capacityVal">0%</strong></div>
    </nav>

    <script>
        // --- CONFIGURACIÓN FIREBASE (Persistent Sync) ---
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            projectId: "TU_PROYECTO_ID",
            appId: "TU_APP_ID"
        };
        // firebase.initializeApp(firebaseConfig);
        // const db = firebase.firestore();

        let myChart;

        // --- INICIALIZACIÓN ---
        window.onload = () => {
            initChart();
            loadLocalData(); // Recupera datos previos si existen
            if(document.querySelectorAll('.expense-row').length === 0) addExpenseRow();
        };

        function initChart() {
            const ctx = document.getElementById('budgetChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Gastos', 'Disponible'],
                    datasets: [{
                        data: [0, 100],
                        backgroundColor: ['#f43f5e', '#6366f1'],
                        borderWidth: 0,
                        hoverOffset: 10
                    }]
                },
                options: { cutout: '85%', plugins: { legend: { display: false } } }
            });
        }

        // --- LÓGICA DE NEGOCIO Y SINCRONIZACIÓN ---
        function updateCore() {
            const income = parseFloat(document.getElementById('globalIncome').value) || 0;
            let totalSpent = 0;
            let expenseData = [];

            document.querySelectorAll('.expense-row').forEach(row => {
                const name = row.querySelector('.input-text').value;
                const val = parseFloat(row.querySelector('.input-num').value) || 0;
                const color = row.querySelector('input[type="color"]').value;
                const category = row.querySelector('select').value;
                
                totalSpent += val;
                
                // Actualizar visual de fila
                const bar = row.querySelector('.progress-bar');
                const perc = income > 0 ? (val / income) * 100 : 0;
                bar.style.width = Math.min(perc, 100) + '%';
                bar.style.background = color;

                expenseData.push({ name, val, color, category });
            });

            const remaining = income - totalSpent;
            const useCapacity = income > 0 ? (totalSpent / income) * 100 : 0;

            // Actualizar Interfaz Principal
            document.getElementById('spentVal').innerText = `$${totalSpent.toLocaleString()}`;
            document.getElementById('freeVal').innerText = `$${remaining.toLocaleString()}`;
            document.getElementById('goalVal').innerText = `$${(income * 0.1).toLocaleString()}`;
            document.getElementById('capacityVal').innerText = `${useCapacity.toFixed(1)}%`;

            // Actualizar Chart
            myChart.data.datasets[0].data = [totalSpent, remaining > 0 ? remaining : 0];
            myChart.update();

            // Guardado automático LocalStorage
            saveLocal(income, expenseData);
            
            // Sincronización Servidor (Opcional si Firebase está activo)
            // db.collection('budgets').doc('current').set({ income, totalSpent, expenses: expenseData });
        }

        function addExpenseRow(data = null) {
            const master = document.getElementById('expenseMaster');
            const row = document.createElement('div');
            row.className = 'expense-row';
            row.innerHTML = `
                <input type="color" value="${data ? data.color : '#6366f1'}" oninput="updateCore()">
                <input type="text" class="input-text" placeholder="Concepto..." value="${data ? data.name : ''}" oninput="updateCore()">
                <select onchange="updateCore()">
                    <option ${data && data.category === '📌 General' ? 'selected' : ''}>📌 General</option>
                    <option ${data && data.category === '🏠 Vivienda' ? 'selected' : ''}>🏠 Vivienda</option>
                    <option ${data && data.category === '🍔 Comida' ? 'selected' : ''}>🍔 Comida</option>
                    <option ${data && data.category === '🚗 Transporte' ? 'selected' : ''}>🚗 Transporte</option>
                </select>
                <input type="number" class="input-num" value="${data ? data.val : 0}" oninput="updateCore()">
                <button style="background:transparent; border:none; color:var(--text-dim); cursor:pointer; font-size:1.2rem;" onclick="this.parentElement.remove(); updateCore()">✕</button>
                <div class="progress-container"><div class="progress-bar"></div></div>
            `;
            master.appendChild(row);
            updateCore();
        }

        // --- UTILIDADES ---
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }

        function saveLocal(income, expenses) {
            localStorage.setItem('budget_data', JSON.stringify({ income, expenses }));
        }

        function loadLocalData() {
            const saved = JSON.parse(localStorage.getItem('budget_data'));
            if (saved) {
                document.getElementById('globalIncome').value = saved.income;
                saved.expenses.forEach(ex => addExpenseRow(ex));
            }
        }

        function resetAll() {
            if(confirm('¿Seguro que quieres borrar todo?')) {
                localStorage.clear();
                location.reload();
            }
        }
    </script>
</body>
</html>
