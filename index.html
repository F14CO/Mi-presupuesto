<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#0f0f23">
    <title>💰 Smart Budget Pro</title>
    
    <!-- Firebase SDK v8 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* ... [TODO EL CSS ORIGINAL - SIN CAMBIOS] ... */
        :root {
            --primary: #6366f1; --primary-glow: rgba(99, 102, 241, 0.4);
            --secondary: #8b5cf6; --accent: #a78bfa;
            --bg-dark: #0a0a1a; --bg-card: rgba(20, 20, 45, 0.85);
            --bg-glass: rgba(30, 30, 60, 0.6); --border-glass: rgba(255,255,255,0.12);
            --text: #f1f5f9; --text-muted: #94a3b8; --text-dim: #64748b;
            --danger: #f43f5e; --success: #22c55e; --warning: #f59e0b; --info: #38bdf8;
            --radius: 24px; --radius-sm: 16px; --radius-xs: 10px;
            --shadow: 0 20px 60px rgba(0,0,0,0.4); --shadow-glow: 0 0 40px var(--primary-glow);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --sidebar-w: 360px; --safe-t: env(safe-area-inset-top); --safe-b: env(safe-area-inset-bottom);
        }
        [data-theme="light"] {
            --bg-dark: #f8fafc; --bg-card: rgba(255,255,255,0.9);
            --bg-glass: rgba(255,255,255,0.7); --border-glass: rgba(0,0,0,0.08);
            --text: #0f172a; --text-muted: #475569; --text-dim: #64748b;
            --shadow: 0 20px 60px rgba(0,0,0,0.12);
        }
        [data-private="true"] .amount { 
            filter: blur(8px); cursor: default; transition: filter 0.25s; 
            user-select: none;
        }
        [data-private="true"] .amount:hover { filter: blur(0); }
        
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html { font-size: 16px; scroll-behavior: smooth; }
        @media (max-width: 400px) { html { font-size: 14px; } }
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-dark);
            background-image: 
                radial-gradient(ellipse at 20% 10%, rgba(99,102,241,0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 90%, rgba(139,92,246,0.12) 0%, transparent 50%),
                linear-gradient(180deg, var(--bg-dark) 0%, var(--bg-dark) 100%);
            color: var(--text);
            min-height: 100vh; min-height: 100dvh;
            line-height: 1.5; -webkit-font-smoothing: antialiased;
            transition: var(--transition);
            overflow-x: hidden;
            padding-bottom: calc(100px + var(--safe-b));
        }
        
        /* [TODO EL CSS RESTANTE - SIN CAMBIOS] */
        /* ... [CSS COMPLETO SIN MODIFICACIONES] ... */
        
        .empty { text-align: center; padding: 36px 18px; color: var(--text-dim); }
        .empty-icon { font-size: 2.9rem; margin-bottom: 11px; opacity: 0.5; }
        .empty-txt { font-size: 0.92rem; }
    </style>
</head>
<body>

<!-- [TODO EL HTML ORIGINAL - SIN CAMBIOS] -->
<!-- ... [HTML COMPLETO SIN MODIFICACIONES] ... -->

<input type="file" id="importFile" accept=".json" style="display:none">

<script>
(function(){
    "use strict";

    // ==========================================
    // 🔥 CONFIGURACIÓN FIREBASE - SIN MODIFICAR
    // ==========================================
    var firebaseConfig = {
        apiKey: "AIzaSyCLb7LaJypnUHQ0TKZ2aTRNK4yAa6SUiZE",
        authDomain: "calculadoramensualsueldo.firebaseapp.com",
        projectId: "calculadoramensualsueldo",
        storageBucket: "calculadoramensualsueldo.appspot.com",
        messagingSenderId: "619721076451",
        appId: "1:619721076451:web:56925f6251a3ba53ad5fd6"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    var db = firebase.firestore();
    
    // Referencia al documento
    var docRef = db.collection("usuarios").doc("x9k2mP7qLz4wN1vB8cR5Hernan2026");

    // ==========================================
    // ESTADO GLOBAL
    // ==========================================
    var isUpdatingFromDB = false;
    var saveTimeout;
    
    // Variables adicionales
    var currency = 'USD';
    var privateMode = false;
    var chartInst = null;
    
    var sym = {USD:'$', EUR:'€', MXN:'$', COP:'$'};
    var icons = {general:'📌',vivienda:'🏠',comida:'🍔',transporte:'🚗',servicios:'💡',ocio:'🎮',salud:'🏥',emergencia:'🚨',vacaciones:'✈️',inversion:'📈',compra:'🛒',educacion:'📚'};
    var CIRC = 2 * Math.PI * 54;

    // ==========================================
    // ✅ CORRECCIÓN 1: Helpers DOM seguros
    // ==========================================
    var $ = function(s){ 
        var el = document.querySelector(s); 
        return el ? el : { value: '', textContent: '', innerHTML: '', className: '', style: {}, classList: { toggle: function(){}, add: function(){}, remove: function(){} }, appendChild: function(){}, remove: function(){} }; 
    };
    var $$ = function(s){ 
        var els = document.querySelectorAll(s); 
        return els ? Array.from(els) : []; 
    };

    // ==========================================
    // ✅ CORRECCIÓN 2: Funciones UI con verificación
    // ==========================================
    function updateSync(txt, type){
        var icons={success:'✓',warning:'📡',error:'❌'}, cls={success:'',warning:'warning',error:'error'};
        var badge = $('#syncBadge');
        if(badge && badge.firstChild) badge.firstChild.textContent = icons[type]; 
        var syncText = $('#syncText');
        if(syncText) syncText.textContent = txt.replace(/^[✓📡❌]\s*/,'');
        var syncStatus = $('#syncStatus');
        if(syncStatus) syncStatus.textContent = txt; 
        var syncOrb = $('#syncOrb');
        if(syncOrb) syncOrb.className = 'sync-orb '+cls[type];
        if(badge) badge.className = 'sync-badge '+cls[type];
    }
    
    function toast(msg, type){
        if(type===undefined) type='success';
        var t=document.createElement('div'); 
        t.className='toast '+type; 
        t.innerHTML='<span>'+(type==='success'?'✅':'❌')+'</span><span>'+msg+'</span>';
        var toastBox = $('#toastBox');
        if(toastBox) toastBox.appendChild(t); 
        setTimeout(function(){
            if(t) {
                t.style.opacity='0';
                t.style.transform='translateX(35px)';
                setTimeout(function(){ if(t && t.parentNode) t.remove(); }, 220);
            }
        }, 3200);
    }
    
    // ==========================================
    // ✅ CORRECCIÓN 3: Carga segura de preferencias
    // ==========================================
    function loadPrefs(){ 
        try{ 
            var t=localStorage.getItem('sbp_theme'); 
            if(t==='light'){ 
                document.documentElement.setAttribute('data-theme','light'); 
                var themeToggle = $('#themeToggle');
                if(themeToggle) themeToggle.classList.add('active'); 
            } 
            var c=localStorage.getItem('sbp_curr'); 
            if(c){ currency=c; if(typeof updateCurrencyUI === 'function') updateCurrencyUI(); } 
            var col=localStorage.getItem('sbp_color'); 
            if(col){ 
                document.documentElement.style.setProperty('--primary',col); 
                var dots = $$('.color-dot');
                if(dots) dots.forEach(function(p){ 
                    if(p && p.dataset && p.dataset.c === col) p.classList.add('active'); 
                }); 
            } 
            var p=localStorage.getItem('sbp_priv'); 
            if(p==='true'){ 
                privateMode=true; 
                document.documentElement.setAttribute('data-private',true); 
                var privToggle = $('#privateToggle');
                if(privToggle) privToggle.classList.add('active'); 
            } 
        }catch(e){} 
    }
    
    function savePrefs(){ 
        try{ 
            localStorage.setItem('sbp_theme',document.documentElement.hasAttribute('data-theme')?'light':'dark'); 
            localStorage.setItem('sbp_curr',currency); 
            localStorage.setItem('sbp_color',getComputedStyle(document.documentElement).getPropertyValue('--primary').trim()); 
            localStorage.setItem('sbp_priv',privateMode); 
        }catch(e){} 
    }

    // ==========================================
    // ✅ CORRECCIÓN 4: Inicialización después de DOMContentLoaded
    // ==========================================
    function init(){
        // Verificar que los elementos críticos existen
        if(!document.getElementById('listG') || !document.getElementById('listA')) {
            console.warn('⚠️ Elementos del DOM no listos, reintentando...');
            setTimeout(init, 100);
            return;
        }
        
        renderColors(); 
        setupEvents(); 
        setupFirestoreListener(); 
        loadPrefs();
        toast('✨ Smart Budget Pro listo', 'success');
    }

    // ==========================================
    // 🔥 SINCRONIZACIÓN - CON VERIFICACIONES DE SEGURIDAD
    // ==========================================
    function setupFirestoreListener() {
        console.log('📡 Configurando listener de Firestore');
        updateSync('🔄 Conectando...','warning');
        
        docRef.onSnapshot(function(doc) {
            console.log('📥 Recibiendo datos...');
            
            if (doc.exists) {
                var data = doc.data();
                console.log('Datos recibidos:', data);
                
                isUpdatingFromDB = true;
                
                // Cargar sueldo - CON VERIFICACIÓN
                var sueldoInput = document.getElementById('sueldoBase');
                if (sueldoInput && data.sueldo !== undefined) {
                    sueldoInput.value = data.sueldo;
                }
                
                // Cargar color del tema - CON VERIFICACIÓN
                if (data.temaColor) {
                    document.documentElement.style.setProperty('--primary', data.temaColor);
                    // Actualizar preset de color activo
                    var dots = $$('.color-dot');
                    if(dots) dots.forEach(function(p){ 
                        if(p && p.dataset) p.classList.toggle('active', p.dataset.c === data.temaColor); 
                    });
                }
                
                // Cargar modo oscuro/claro - CON VERIFICACIÓN
                if (data.darkMode !== undefined) {
                    var isDark = data.darkMode;
                    if(isDark) {
                        document.documentElement.removeAttribute('data-theme');
                    } else {
                        document.documentElement.setAttribute('data-theme', 'light');
                    }
                    var themeToggle = document.getElementById('themeToggle');
                    if(themeToggle) themeToggle.classList.toggle('active', !isDark);
                }
                
                // Cargar moneda - CON VERIFICACIÓN
                if (data.currency) { 
                    currency = data.currency; 
                    if(typeof updateCurrencyUI === 'function') updateCurrencyUI(); 
                }
                
                // Cargar modo privado - CON VERIFICACIÓN
                if (data.privateMode !== undefined) { 
                    privateMode = data.privateMode; 
                    document.documentElement.setAttribute('data-private', privateMode);
                    var privToggle = document.getElementById('privateToggle');
                    if(privToggle) privToggle.classList.toggle('active', privateMode);
                }
                
                // Cargar listas - CON VERIFICACIÓN
                renderLists(data.gastos || [], data.ahorros || []);
                
                // Calcular totales - CON VERIFICACIÓN
                if(typeof calc === 'function') calc(); 
                if(typeof updateBadges === 'function') updateBadges();
                
                isUpdatingFromDB = false;
                updateSync('✅ Sincronizado','success');
                var lastSync = document.getElementById('lastSync');
                if(lastSync) lastSync.textContent = new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
                
            } else {
                console.log('📄 Documento no existe, creando...');
                // Documento no existe, crear estructura inicial
                docRef.set({
                    sueldo: 0,
                    temaColor: '#6366f1',
                    darkMode: false,
                    currency: 'USD',
                    privateMode: false,
                    gastos: [],
                    ahorros: [],
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                }).then(function() {
                    console.log('✅ Documento creado');
                    updateSync('📝 Nuevo documento','warning');
                });
            }
        }, function(error) {
            console.error('❌ Error de sincronización:', error);
            updateSync('❌ Error de conexión','error');
            toast('Error de sincronización', 'error');
        });
    }

    // ==========================================
    // FUNCIONES DEL CÓDIGO 2 - CON VERIFICACIONES
    // ==========================================
    function renderLists(gastos, ahorros){
        var c1 = document.getElementById('listG'), c2 = document.getElementById('listA');
        if(!c1 || !c2) return;
        
        c1.innerHTML = ''; c2.innerHTML = '';
        
        if(gastos.length){
            gastos.forEach(function(i){ createItem('g',i,true); });
        } else {
            empty(c1,'📭','Sin gastos','Agrega tu primer gasto');
        }
        if(ahorros.length){
            ahorros.forEach(function(i){ createItem('a',i,true); });
        } else {
            empty(c2,'🏦','Sin metas','Define una meta de ahorro');
        }
    }

    function createItem(type, data, fromDB){
        if(fromDB === undefined) fromDB = false;
        var container = document.getElementById(type==='g' ? 'listG' : 'listA');
        if(!container) return;
        
        if(container.querySelector('.empty')) container.innerHTML = '';
        
        var row = document.createElement('div');
        row.className = 'item' + (data.completed ? ' completed' : '');
        row.style.setProperty('--item-color', data.color || (type==='g' ? '#f43f5e' : '#22c55e'));
        
        var cats = (type==='g' 
            ? ['general','vivienda','comida','transporte','servicios','ocio','salud']
            : ['general','emergencia','vacaciones','inversion','compra','educacion']
        ).map(function(c){ return '<option value="'+c+'" '+(c===data.category?'selected':'')+'>'+icons[c]+' '+c+'</option>'; }).join('');
        
        row.innerHTML = 
            '<div class="item-bar"></div>'+
            '<div class="item-color-wrap"><input type="color" class="item-color" value="'+(data.color||'#f43f5e')+'"></div>'+
            '<div class="item-body">'+
                '<span class="item-icon">'+(icons[data.category]||'📌')+'</span>'+
                '<div class="item-info">'+
                    '<input type="text" class="item-name" placeholder="'+(type==='g'?'Gasto...':'Meta...')+'" value="'+(data.nombre||'')+'">'+
                    '<div class="item-row">'+
                        '<select class="item-cat">'+cats+'</select>'+
                        '<input type="number" class="item-val amount" placeholder="0" min="0" step="0.01" value="'+(data.monto||'')+'">'+
                    '</div>'+
                '</div>'+
            '</div>'+
            '<div class="item-actions">'+
                '<button class="btn-check" title="Completado">✔️</button>'+
                '<button class="btn-del" title="Eliminar">✕</button>'+
            '</div>';
        
        var name = row.querySelector('.item-name'), amt = row.querySelector('.item-val'), 
            sel = row.querySelector('.item-cat'), col = row.querySelector('.item-color'),
            comp = row.querySelector('.btn-check'), rem = row.querySelector('.btn-del');
        
        if(name) name.addEventListener('input', function(){ if(!isUpdatingFromDB) userChange(); });
        if(amt) amt.addEventListener('input', function(){ if(!isUpdatingFromDB) userChange(); });
        if(sel) sel.addEventListener('change', function(){ 
            var icon = row.querySelector('.item-icon');
            if(icon) icon.textContent = icons[sel.value]||'📌'; 
            if(!isUpdatingFromDB) userChange(); 
        });
        if(col) col.addEventListener('input', function(){ 
            row.style.setProperty('--item-color', col.value); 
            if(!isUpdatingFromDB) userChange(); 
        });
        if(comp) comp.addEventListener('click', function(){ 
            row.classList.toggle('completed'); 
            if(!isUpdatingFromDB) userChange(); 
        });
        if(rem) rem.addEventListener('click', function(){
            row.style.opacity='0'; row.style.transform='translateX(20px)';
            setTimeout(function(){ 
                if(row && row.parentNode) row.remove(); 
                if(!container.querySelector('.item')) {
                    empty(container, type==='g'?'📭':'🏦', 
                        type==='g'?'Sin gastos':'Sin metas', 
                        'Agrega uno nuevo');
                }
                if(!isUpdatingFromDB) userChange(); 
            }, 220);
        });
        
        // Swipe to delete (mobile)
        var touchX = 0;
        row.addEventListener('touchstart', function(e){ touchX = e.touches[0].clientX; }, {passive:true});
        row.addEventListener('touchend', function(e){
            if(touchX - e.changedTouches[0].clientX > 40 && rem) rem.click();
        }, {passive:true});
        
        container.appendChild(row);
        if(!fromDB) userChange();
    }

    function empty(el, icon, title, sub){ 
        if(el) el.innerHTML = '<div class="empty"><div class="empty-icon">'+icon+'</div><p class="empty-txt"><strong>'+title+'</strong><br><small>'+sub+'</small></p></div>'; 
    }

    function calc(){
        var sueldoInput = document.getElementById('sueldoBase');
        var sueldo = sueldoInput ? +sueldoInput.value || 0 : 0;
        var symbol = sym[currency];
        var gastos=0, ahorros=0;
        
        var gastoInputs = document.querySelectorAll('#listG .item-val');
        if(gastoInputs) gastoInputs.forEach(function(i){ gastos += +i.value||0; });
        
        var ahorroInputs = document.querySelectorAll('#listA .item-val');
        if(ahorroInputs) ahorroInputs.forEach(function(i){ ahorros += +i.value||0; });
        
        var disponible = Math.max(0, sueldo - gastos - ahorros);
        var exceso = (gastos + ahorros) > sueldo;
        
        var gp = sueldo ? Math.min(100, (gastos/sueldo)*100) : 0;
        var ap = sueldo ? Math.min(100, (ahorros/sueldo)*100) : 0;
        var dp = sueldo ? Math.max(0, (disponible/sueldo)*100) : 0;
        
        animate('statG', gastos, symbol); animate('statA', ahorros, symbol); animate('statD', disponible, symbol);
        updateRing('gRing', gp); updateRing('aRing', ap); updateRing('dRing', dp);
        
        var gPct = document.getElementById('gPct');
        if(gPct) gPct.textContent = sueldo ? Math.round(gp)+'%' : '0%';
        var aPct = document.getElementById('aPct');
        if(aPct) aPct.textContent = sueldo ? Math.round(ap)+'%' : '0%';
        var dPct = document.getElementById('dPct');
        if(dPct) dPct.textContent = sueldo ? Math.round(dp)+'%' : '0%';
        
        var fG = document.getElementById('fG');
        if(fG) fG.textContent = symbol+' '+fmt(gastos);
        var fA = document.getElementById('fA');
        if(fA) fA.textContent = symbol+' '+fmt(ahorros);
        var fD = document.getElementById('fD');
        if(fD) fD.textContent = symbol+' '+fmt(disponible);
        
        var fGP = document.getElementById('fGP');
        if(fGP) fGP.textContent = Math.round(gp)+'%';
        var fAP = document.getElementById('fAP');
        if(fAP) fAP.textContent = Math.round(ap)+'%';
        var fDP = document.getElementById('fDP');
        if(fDP) fDP.textContent = Math.round(dp)+'%';
        
        var gProgTxt = document.getElementById('gProgTxt');
        if(gProgTxt) gProgTxt.textContent = Math.round(gp)+'%';
        var gProg = document.getElementById('gProg');
        if(gProg) gProg.style.width = gp+'%';
        
        var aProgTxt = document.getElementById('aProgTxt');
        if(aProgTxt) aProgTxt.textContent = Math.round(ap)+'%';
        var aProg = document.getElementById('aProg');
        if(aProg) aProg.style.width = ap+'%';
        
        var alertG = document.getElementById('alertG');
        if(alertG) alertG.style.display = exceso ? 'block' : 'none';
        
        updateBadges();
    }

    function animate(id, val, sym){
        var el = document.getElementById(id);
        if(!el) return;
        var cur = +el.textContent.replace(/[^0-9.-]/g,'')||0;
        var dur=320, steps=16, inc=(val-cur)/steps;
        var s=0; 
        var t=setInterval(function(){ 
            s++; 
            el.textContent = sym+' '+fmt(Math.round((cur+inc*s)*100)/100); 
            if(s>=steps){ clearInterval(t); el.textContent = sym+' '+fmt(val); } 
        }, dur/steps);
    }
    
    function fmt(n){ return n.toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2}); }
    
    function updateRing(id, pct){ 
        var c = document.getElementById(id);
        if(c) c.style.strokeDashoffset = CIRC - (pct/100)*CIRC; 
    }

    function updateBadges(){
        var sueldoInput = document.getElementById('sueldoBase');
        var s = sueldoInput ? +sueldoInput.value||0 : 0;
        var g = 0, ah = 0;
        
        var gastoInputs = document.querySelectorAll('#listG .item-val');
        if(gastoInputs) gastoInputs.forEach(function(i){ g += +i.value||0; });
        
        var ahorroInputs = document.querySelectorAll('#listA .item-val');
        if(ahorroInputs) ahorroInputs.forEach(function(i){ ah += +i.value||0; });
        
        var d = s - g - ah;
        
        var gb = document.getElementById('gHealth');
        if(gb) {
            if(!s){ gb.textContent='Sin ingresos'; gb.className='health-pill warning'; }
            else { 
                var p=(g/s)*100; 
                if(p<50){gb.textContent='Excelente';gb.className='health-pill healthy'} 
                else if(p<90){gb.textContent='Normal';gb.className='health-pill warning'} 
                else {gb.textContent='A Mejorar';gb.className='health-pill critical'} 
            }
        }
        
        var db = document.getElementById('dHealth');
        if(db) {
            if(!s){ db.textContent='Sin ingresos'; db.className='health-pill warning'; }
            else { 
                var p=(d/s)*100; 
                if(p>40){db.textContent='Saludable';db.className='health-pill healthy'} 
                else if(p>15){db.textContent='Ajustado';db.className='health-pill warning'} 
                else {db.textContent='Crítico';db.className='health-pill critical'} 
            }
        }
        
        var ab = document.getElementById('aHealth');
        if(ab) {
            if(!s){ ab.textContent='Sin ingresos'; ab.className='health-pill warning'; }
            else { 
                var p=(ah/s)*100; 
                if(p>=30){ab.textContent='¡Excelente!';ab.className='health-pill healthy'} 
                else if(p>=10){ab.textContent='Bien';ab.className='health-pill warning'} 
                else {ab.textContent='A Mejorar';ab.className='health-pill critical'} 
            }
        }
    }

    // ==========================================
    // GUARDADO - CON VERIFICACIONES
    // ==========================================
    function userChange(){ 
        if(isUpdatingFromDB) return; 
        if(typeof calc === 'function') calc(); 
        updateSync('📡 Guardando...','warning'); 
        clearTimeout(saveTimeout); 
        
        saveTimeout = setTimeout(function() {
            var sueldoInput = document.getElementById('sueldoBase');
            var sueldo = sueldoInput ? +sueldoInput.value || 0 : 0;
            var theme = getComputedStyle(document.documentElement).getPropertyValue('--primary').trim();
            var isDark = !document.documentElement.hasAttribute('data-theme');
            
            var data = {
                sueldo: sueldo,
                temaColor: theme,
                darkMode: isDark,
                currency: currency,
                privateMode: privateMode,
                gastos: getItemsArray('g'),
                ahorros: getItemsArray('a'),
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            
            docRef.set(data, { merge: true })
                .then(function() {
                    console.log('✅ Datos guardados');
                    updateSync('✅ Guardado');
                    setTimeout(function() {
                        updateSync('✅ Sincronizado');
                    }, 1000);
                })
                .catch(function(error) {
                    console.error('❌ Error al guardar:', error);
                    updateSync('❌ Error al guardar','error');
                });
        }, 800);
    }
    
    function getItemsArray(type) {
        var containerId = type === 'g' ? '#listG' : '#listA';
        var items = [];
        
        var rows = document.querySelectorAll(containerId + ' .item');
        if(rows) rows.forEach(function(row) {
            var nameEl = row.querySelector('.item-name');
            var valEl = row.querySelector('.item-val');
            var catEl = row.querySelector('.item-cat');
            if(nameEl && valEl) {
                items.push({
                    nombre: nameEl.value,
                    monto: +valEl.value || 0,
                    color: row.style.getPropertyValue('--item-color').trim() || (type==='g' ? '#f43f5e' : '#22c55e'),
                    category: catEl ? catEl.value : 'general',
                    completed: row.classList.contains('completed')
                });
            }
        });
        
        return items;
    }

    // ==========================================
    // FUNCIONES UI - CON VERIFICACIONES
    // ==========================================
    function toggleMenu(){ 
        var sidebar = document.getElementById('sidebar');
        var overlay = document.getElementById('overlay');
        if(sidebar) sidebar.classList.toggle('active'); 
        if(overlay) overlay.classList.toggle('active'); 
    }
    
    function toggleTheme(){ 
        var h=document.documentElement, isDark=!h.hasAttribute('data-theme');
        if(isDark) h.setAttribute('data-theme', 'light');
        else h.removeAttribute('data-theme');
        var themeToggle = document.getElementById('themeToggle');
        if(themeToggle) themeToggle.classList.toggle('active', !isDark); 
        if(!isUpdatingFromDB) userChange(); 
        toast(isDark?'☀️ Modo claro':'🌙 Modo oscuro','success'); 
    }
    
    function togglePrivate(){ 
        privateMode = !privateMode; 
        document.documentElement.setAttribute('data-private',privateMode); 
        var privToggle = document.getElementById('privateToggle');
        if(privToggle) privToggle.classList.toggle('active',privateMode); 
        if(!isUpdatingFromDB) userChange(); 
        toast(privateMode?'👁️ Montos ocultos':'👁️ Montos visibles','success'); 
    }
    
    function setCurrency(c){ 
        currency=c; updateCurrencyUI(); 
        if(!isUpdatingFromDB) userChange(); 
        toast('💱 '+c,'success'); 
        toggleMenu(); 
    }
    
    function updateCurrencyUI(){ 
        var btns = $$('.currency-btn');
        if(btns) btns.forEach(function(b){ if(b && b.dataset) b.classList.toggle('active',b.dataset.c===currency); }); 
        calc(); 
    }
    
    function renderColors(){
        var colors=['#6366f1','#ec4899','#10b981','#f59e0b','#3b82f6','#8b5cf6','#f43f5e','#14b8a6','#a855f7','#22c55e'];
        var c=document.getElementById('colorGrid'); 
        if(c) c.innerHTML=colors.map(function(col){ return '<div class="color-dot" data-c="'+col+'" style="background:'+col+'"></div>'; }).join('');
        var dots = $$('.color-dot');
        if(dots) dots.forEach(function(p){ 
            if(p) p.onclick=function(){ 
                var allDots = $$('.color-dot');
                if(allDots) allDots.forEach(function(x){ if(x) x.classList.remove('active'); }); 
                p.classList.add('active'); 
                document.documentElement.style.setProperty('--primary',p.dataset.c); 
                if(!isUpdatingFromDB) userChange(); 
                toast('🎨 Color actualizado','success'); 
            }; 
        });
    }
    
    function setupEvents(){
        var sueldoInput = document.getElementById('sueldoBase');
        if(sueldoInput) sueldoInput.addEventListener('input', userChange);
        
        var btnG = document.getElementById('btnG');
        if(btnG) btnG.onclick=function(){ createItem('g',{nombre:'',monto:'',color:'#f43f5e',category:'general'}); };
        
        var btnA = document.getElementById('btnA');
        if(btnA) btnA.onclick=function(){ createItem('a',{nombre:'',monto:'',color:'#22c55e',category:'general'}); };
        
        var currBtns = $$('.currency-btn');
        if(currBtns) currBtns.forEach(function(b){ 
            if(b && b.dataset) b.onclick=function(){ setCurrency(b.dataset.c); }; 
        });
        
        document.addEventListener('keydown',function(e){ 
            if(e.key==='Escape'){ toggleMenu(); closeModal(); closeChart(); closeManual(); } 
            if(e.key.toLowerCase()==='m') toggleMenu(); 
            if(e.key.toLowerCase()==='t') toggleTheme(); 
            if(e.key.toLowerCase()==='p') togglePrivate(); 
            if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='s'){ e.preventDefault(); forceSync(); } 
        });
        
        var overlay = document.getElementById('overlay');
        if(overlay) overlay.onclick=toggleMenu; 
        
        var importFile = document.getElementById('importFile');
        if(importFile) importFile.onchange=handleImport;
    }
    
    // Export/Import - CON VERIFICACIONES
    function exportData(){ 
        docRef.get().then(function(doc){ 
            if(doc && doc.exists){ 
                var b=new Blob([JSON.stringify(doc.data(),null,2)],{type:'application/json'}), 
                a=document.createElement('a'); 
                a.href=URL.createObjectURL(b); 
                a.download='budget_'+new Date().toISOString().slice(0,10)+'.json'; 
                a.click(); 
                toast('📤 Exportado','success'); 
            } 
        }); 
        toggleMenu(); 
    }
    
    function exportCSV(){ 
        var r=[['Tipo','Nombre','Categoría','Monto','Completado']]; 
        var gastoItems = document.querySelectorAll('#listG .item');
        if(gastoItems) gastoItems.forEach(function(row){ 
            var name = row.querySelector('.item-name');
            var cat = row.querySelector('.item-cat');
            var val = row.querySelector('.item-val');
            if(name && cat && val) {
                r.push(['Gasto',name.value,cat.value,val.value,row.classList.contains('completed')?'Sí':'No']); 
            }
        }); 
        var ahorroItems = document.querySelectorAll('#listA .item');
        if(ahorroItems) ahorroItems.forEach(function(row){ 
            var name = row.querySelector('.item-name');
            var cat = row.querySelector('.item-cat');
            var val = row.querySelector('.item-val');
            if(name && cat && val) {
                r.push(['Ahorro',name.value,cat.value,val.value,row.classList.contains('completed')?'Sí':'No']); 
            }
        }); 
        var csv=r.map(function(x){ return x.map(function(c){ return '"'+c+'"'; }).join(','); }).join('\n'), 
        b=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'}), 
        a=document.createElement('a'); 
        a.href=URL.createObjectURL(b); 
        a.download='budget_'+new Date().toISOString().slice(0,10)+'.csv'; 
        a.click(); 
        toast('📊 CSV exportado','success'); 
        toggleMenu(); 
    }
    
    function importData(){ 
        var importFile = document.getElementById('importFile');
        if(importFile) importFile.click(); 
        toggleMenu(); 
    }
    
    function handleImport(e){ 
        var f=e.target.files[0]; if(!f) return; 
        var rd=new FileReader(); 
        rd.onload=function(ev){ 
            try{ 
                var d=JSON.parse(ev.target.result); 
                if(d && d.sueldo!==undefined){ 
                    docRef.set(d).then(function(){ toast('📥 Importado','success'); setTimeout(function(){location.reload();},1000); }); 
                } else throw 0; 
            }catch(err){ toast('❌ Archivo inválido','error'); } 
        }; 
        rd.readAsText(f); e.target.value=''; 
    }

    // Gráficas - CON VERIFICACIÓN DE CHART.JS
    function showChart(){
        var chartCanvas = document.getElementById('chart');
        if(!chartCanvas) return;
        
        var ctx=chartCanvas.getContext('2d'), cats={}, total=0;
        var gastoItems = document.querySelectorAll('#listG .item');
        if(gastoItems) gastoItems.forEach(function(r){ 
            var catEl = r.querySelector('.item-cat');
            var valEl = r.querySelector('.item-val');
            if(catEl && valEl) {
                var c=catEl.value||'general', m=+valEl.value||0; 
                if(m>0){ cats[c]=(cats[c]||0)+m; total+=m; } 
            }
        });
        if(!total){ toast('📊 Agrega gastos primero','warning'); toggleMenu(); return; }
        var labels=Object.keys(cats).map(function(c){ return (icons[c]||'📌')+' '+c; }), data=Object.values(cats), colors=['#6366f1','#ec4899','#10b981','#f59e0b','#3b82f6','#8b5cf6','#f43f5e','#14b8a6'];
        
        // Destruir instancia anterior si existe
        if(chartInst) { chartInst.destroy(); chartInst = null; }
        
        // Verificar que Chart está disponible
        if(typeof Chart === 'undefined') {
            toast('📊 Gráfica no disponible','warning');
            toggleMenu();
            return;
        }
        
        chartInst=new Chart(ctx,{
            type:'doughnut',
            data:{labels:labels,datasets:[{data:data,borderColor:colors.slice(0,data.length),backgroundColor:colors.slice(0,data.length).map(function(c){return c+'99';}),borderWidth:2}]},
            options:{
                responsive:true,maintainAspectRatio:false,cutout:'68%',
                plugins:{
                    legend:{display:false},
                    tooltip:{
                        callbacks:{
                            label:function(ctx){ return ctx.label+': '+sym[currency]+ctx.parsed.toFixed(2)+' ('+((ctx.parsed/total)*100).toFixed(1)+'%)'; }
                        }
                    }
                },
                animation:{animateScale:true,animateRotate:true}
            }
        });
        var chartModal = document.getElementById('chartModal');
        if(chartModal) chartModal.classList.add('active'); 
        toggleMenu();
    }
    
    function closeChart(){ 
        var chartModal = document.getElementById('chartModal');
        if(chartModal) chartModal.classList.remove('active'); 
    }

    function showStats(){ 
        var sueldoInput = document.getElementById('sueldoBase');
        var s = sueldoInput ? +sueldoInput.value||0 : 0;
        var g = 0, ah = 0;
        
        var gastoInputs = document.querySelectorAll('#listG .item-val');
        if(gastoInputs) gastoInputs.forEach(function(i){ g += +i.value||0; });
        
        var ahorroInputs = document.querySelectorAll('#listA .item-val');
        if(ahorroInputs) ahorroInputs.forEach(function(i){ ah += +i.value||0; });
        
        var d=s-g-ah, sy=sym[currency]; 
        modal('📊 Resumen','💵 Ingreso: '+sy+fmt(s)+'\n💸 Gastos: '+sy+fmt(g)+' ('+(s?((g/s)*100).toFixed(1):0)+'%)\n🎯 Ahorros: '+sy+fmt(ah)+' ('+(s?((ah/s)*100).toFixed(1):0)+'%)\n💎 Disponible: '+sy+fmt(Math.max(0,d))); 
        toggleMenu(); 
    }
    
    function confirmReset(){ 
        modal('🗑️ ¿Borrar todo?','⚠️ Esta acción es irreversible. ¿Continuar?',function(){ 
            docRef.delete().then(function(){ toast('🗑️ Datos borrados','success'); setTimeout(function(){location.reload();},1000); }); 
        }); 
        toggleMenu(); 
    }
    
    function forceSync(){ 
        updateSync('🔄 Sincronizando...','warning'); 
        userChange(); 
        setTimeout(function(){toast('✅ Sincronizado','success');},1000); 
        toggleMenu(); 
    }

    function modal(title, text, onConfirm){ 
        var mTitle = document.getElementById('mTitle');
        var mText = document.getElementById('mText');
        var mConfirm = document.getElementById('mConfirm');
        var modalEl = document.getElementById('modal');
        
        if(mTitle) mTitle.textContent=title; 
        if(mText) mText.textContent=text; 
        if(mConfirm) {
            mConfirm.onclick=function(){ closeModal(); if(onConfirm) onConfirm(); }; 
            mConfirm.textContent=onConfirm?'Confirmar':'Cerrar'; 
        }
        if(modalEl) modalEl.classList.add('active'); 
    }
    
    function closeModal(){ 
        var modalEl = document.getElementById('modal');
        if(modalEl) modalEl.classList.remove('active'); 
    }
    
    function showManual(){ 
        var manualModal = document.getElementById('manualModal');
        if(manualModal) manualModal.classList.add('active'); 
        toggleMenu(); 
    }
    
    function closeManual(){ 
        var manualModal = document.getElementById('manualModal');
        if(manualModal) manualModal.classList.remove('active'); 
    }

    // ==========================================
    // ✅ CORRECCIÓN FINAL: Iniciar solo cuando DOM esté listo
    // ==========================================
    if(document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        // DOM ya está listo
        init();
    }
    
    // Expose globals para funciones onclick del HTML
    window.toggleMenu=toggleMenu; window.toggleTheme=toggleTheme; window.togglePrivate=togglePrivate; 
    window.setCurrency=setCurrency; window.exportData=exportData; window.exportCSV=exportCSV; 
    window.importData=importData; window.showChart=showChart; window.closeChart=closeChart; 
    window.showStats=showStats; window.confirmReset=confirmReset; window.forceSync=forceSync; 
    window.closeModal=closeModal; window.closeManual=closeManual; window.userChange=userChange;
    
})();
</script>
</body>
</html>
