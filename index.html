<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Budget Pro | Full Sync</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --accent: #f43f5e;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            background-image: radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            margin: 0;
            padding-bottom: 120px;
        }

        /* BARRA LATERAL */
        .sidebar {
            position: fixed;
            left: -300px;
            top: 0;
            width: 260px;
            height: 100%;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            z-index: 2000;
            padding: 30px;
            transition: var(--transition);
            border-right: 1px solid var(--glass-border);
        }
        .sidebar.active { left: 0; }

        /* HEADER */
        .top-banner {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            padding: 50px 20px 60px;
            border-radius: 0 0 40px 40px;
            text-align: center;
            position: relative;
        }

        .menu-toggle {
            position: absolute;
            left: 20px;
            top: 25px;
            font-size: 24px;
            cursor: pointer;
        }

        .main-income-input {
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            color: white;
            font-size: 2.5rem;
            font-weight: 800;
            width: 250px;
            text-align: center;
            padding: 10px;
            margin-top: 15px;
            outline: none;
            transition: var(--transition);
        }

        .container {
            max-width: 550px;
            margin: -30px auto 0;
            padding: 0 20px;
        }

        /* ESTADÍSTICAS RÁPIDAS */
        .quick-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 28px;
            text-align: center;
        }

        /* GRÁFICO */
        .chart-box {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* FILAS DE GASTOS (CONSERVANDO LÓGICA DE PERSISTENCIA) */
        .expense-item {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 15px;
            display: grid;
            grid-template-columns: 8px 1fr auto auto 30px;
            align-items: center;
            gap: 12px;
            transition: var(--transition);
        }

        .expense-item:hover { border-color: var(--primary); }

        /* Selector de Color Minimalista */
        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 8px;
            height: 40px;
            background: none;
            cursor: pointer;
            padding: 0;
        }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 10px; }

        .input-name, .input-val, select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid transparent;
            color: white;
            border-radius: 10px;
            padding: 8px;
            outline: none;
        }

        select option { background: #1e293b; color: white; }

        .input-val { width: 80px; font-weight: 700; color: var(--primary); text-align: right; }

        /* BARRA DE PROGRESO INVISIBLE HASTA QUE SE USA */
        .progress-row {
            grid-column: 1 / -1;
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            margin-top: 5px;
            overflow: hidden;
        }

        .progress-fill { height: 100%; transition: width 0.5s ease; }

        /* FAB */
        .fab {
            position: fixed;
            bottom: 110px;
            right: 25px;
            background: var(--primary);
            width: 60px; height: 60px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
            cursor: pointer;
            z-index: 1000;
        }

        /* FOOTER NAV */
        .footer-nav {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(25px);
            border-top: 1px solid var(--glass-border);
            padding: 20px 0;
            display: flex;
            justify-content: space-around;
            z-index: 1500;
        }

        .footer-nav div { text-align: center; }
        .footer-nav span { display: block; font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; }
        .footer-nav strong { font-size: 1.1rem; }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <h2 style="margin-top: 0">Ajustes</h2>
        <p onclick="syncWithServer()">🔄 Forzar Sincronización</p>
        <p onclick="exportReport()">📊 Exportar Informe</p>
        <p onclick="toggleTheme()">🌙 Modo Noche</p>
        <hr style="opacity: 0.1">
        <p style="color: var(--accent);" onclick="confirmClear()">🗑️ Borrar Todo</p>
    </div>

    <div class="top-banner">
        <div class="menu-toggle" onclick="toggleSidebar()">☰</div>
        <span style="font-size: 0.8rem; font-weight: 600; opacity: 0.8;">MI PRESUPUESTO MENSUAL</span><br>
        <input type="number" class="main-income-input" id="totalIncome" value="0" oninput="calculateAll()">
    </div>

    <div class="container">
        <div class="quick-stats">
            <div class="stat-card">
                <span>GASTADO</span>
                <div id="spentDisplay" style="color: var(--accent); font-size: 1.5rem; font-weight: 800;">$0</div>
            </div>
            <div class="stat-card">
                <span>LIBRE</span>
                <div id="freeDisplay" style="color: #10b981; font-size: 1.5rem; font-weight: 800;">$0</div>
            </div>
        </div>

        <div class="chart-box">
            <canvas id="mainChart" width="200" height="200"></canvas>
            <p id="savingAdvice" style="font-size: 0.85rem; color: var(--text-dim); margin-top: 15px; text-align: center;"></p>
        </div>

        <div id="expenseContainer">
            </div>
    </div>

    <div class="fab" onclick="createNewExpense()">+</div>

    <nav class="footer-nav">
        <div><span>Meta Ahorro</span><strong id="goalDisplay">$0</strong></div>
        <div><span>% Gastado</span><strong id="percentDisplay">0%</strong></div>
    </nav>

    <script>
        // CONFIGURACIÓN FIREBASE (REEMPLAZAR CON TUS CREDENCIALES)
        const firebaseConfig = {
            apiKey: "AIzaSy...",
            projectId: "budget-pro-...",
            appId: "1:..."
        };
        
        // Inicialización (Comentar si no tienes Firebase activo aún)
        // firebase.initializeApp(firebaseConfig);
        // const db = firebase.firestore();

        let chart;

        // INICIALIZACIÓN DE GRÁFICO
        function initChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Gastos', 'Ahorro'],
                    datasets: [{
                        data: [0, 100],
                        backgroundColor: ['#f43f5e', '#6366f1'],
                        borderWidth: 0
                    }]
                },
                options: { cutout: '80%', plugins: { legend: { display: false } } }
            });
        }

        // LÓGICA DE NEGOCIO (REINTEGRADA)
        function calculateAll() {
            const income = parseFloat(document.getElementById('totalIncome').value) || 0;
            let totalSpent = 0;

            document.querySelectorAll('.expense-item').forEach(item => {
                const val = parseFloat(item.querySelector('.input-val').value) || 0;
                const color = item.querySelector('input[type="color"]').value;
                totalSpent += val;
                
                // Actualizar barra de progreso de la fila
                const prog = item.querySelector('.progress-fill');
                const perc = income > 0 ? (val / income) * 100 : 0;
                prog.style.width = Math.min(perc, 100) + '%';
                prog.style.background = color;
            });

            const remaining = income - totalSpent;
            const percent = income > 0 ? (totalSpent / income) * 100 : 0;

            // Actualizar Interfaz
            document.getElementById('spentDisplay').innerText = `$${totalSpent.toLocaleString()}`;
            document.getElementById('freeDisplay').innerText = `$${remaining.toLocaleString()}`;
            document.getElementById('goalDisplay').innerText = `$${(income * 0.1).toLocaleString()}`;
            document.getElementById('percentDisplay').innerText = `${percent.toFixed(1)}%`;

            // Actualizar Gráfico
            chart.data.datasets[0].data = [totalSpent, remaining > 0 ? remaining : 0];
            chart.update();

            // Sincronizar (Llamada al servidor)
            saveToServer({ income, totalSpent, remaining });
        }

        function createNewExpense() {
            const container = document.getElementById('expenseContainer');
            const item = document.createElement('div');
            item.className = 'expense-item';
            item.innerHTML = `
                <input type="color" value="#6366f1" oninput="calculateAll()">
                <input type="text" class="input-name" placeholder="Gasto...">
                <select onchange="calculateAll()">
                    <option>📌 General</option>
                    <option>🏠 Vivienda</option>
                    <option>🍔 Comida</option>
                    <option>🚗 Transporte</option>
                </select>
                <input type="number" class="input-val" value="0" oninput="calculateAll()">
                <button style="background:transparent; border:none; color:var(--text-dim); cursor:pointer" onclick="this.parentElement.remove(); calculateAll()">✕</button>
                <div class="progress-row"><div class="progress-fill" style="width:0%"></div></div>
            `;
            container.appendChild(item);
        }

        // PERSISTENCIA
        function saveToServer(data) {
            console.log("Sincronizando con Firestore...", data);
            // db.collection('users').doc('mi-usuario').set(data, {merge: true});
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        // Ejecutar al cargar
        window.onload = () => {
            initChart();
            createNewExpense(); // Iniciar con una fila limpia
        };
    </script>
</body>
</html>
