<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💰 Smart Budget Pro</title>
    
    <!-- Firebase SDK v8 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #0a0a1a; color: #f1f5f9; min-height: 100vh; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: rgba(20,20,45,0.9); padding: 20px; border-radius: 16px; margin-bottom: 20px; }
        input { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 10px; border-radius: 8px; width: 100%; margin: 5px 0; }
        button { background: #6366f1; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin: 5px; }
        button:hover { background: #4f46e5; }
        .item { background: rgba(255,255,255,0.05); padding: 12px; margin: 8px 0; border-radius: 8px; display: flex; gap: 10px; align-items: center; }
        .status { padding: 10px; border-radius: 8px; margin: 10px 0; text-align: center; }
        .status.success { background: rgba(34,197,94,0.2); color: #86efac; }
        .status.error { background: rgba(244,63,94,0.2); color: #fca5a5; }
        .status.warning { background: rgba(245,158,11,0.2); color: #fcd34d; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center; margin-bottom:20px;">💰 Smart Budget Pro</h1>
    
    <div id="syncStatus" class="status warning">🔄 Conectando...</div>
    
    <div class="card">
        <h3>💵 Ingreso Mensual</h3>
        <input type="number" id="sueldoBase" placeholder="0" min="0">
    </div>
    
    <div class="card">
        <h3>💸 Gastos</h3>
        <div id="listaGastos"></div>
        <button onclick="addItem('gastos')">+ Agregar Gasto</button>
    </div>
    
    <div class="card">
        <h3>🎯 Ahorros</h3>
        <div id="listaAhorros"></div>
        <button onclick="addItem('ahorros')">+ Agregar Ahorro</button>
    </div>
    
    <div class="card" style="text-align:center;">
        <h2>💎 Disponible: <span id="resDisponible">$0</span></h2>
    </div>
</div>

<script>
// ==========================================
// 🔥 CONFIGURACIÓN FIREBASE
// ==========================================
var firebaseConfig = {
    apiKey: "AIzaSyCLb7LaJypnUHQ0TKZ2aTRNK4yAa6SUiZE",
    authDomain: "calculadoramensualsueldo.firebaseapp.com",
    projectId: "calculadoramensualsueldo",
    storageBucket: "calculadoramensualsueldo.appspot.com",
    messagingSenderId: "619721076451",
    appId: "1:619721076451:web:56925f6251a3ba53ad5fd6"
};

// Inicializar Firebase
if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}
var db = firebase.firestore();
var docRef = db.collection("usuarios").doc("x9k2mP7qLz4wN1vB8cR5Hernan2026");

// Estado global
var isUpdatingFromDB = false;
var saveTimeout;

// ==========================================
// ✅ SINCRONIZACIÓN - MÉTODO SIMPLE
// ==========================================
function setupSync() {
    updateStatus('🔄 Conectando...', 'warning');
    
    docRef.onSnapshot(function(doc) {
        console.log('📥 Recibiendo datos...');
        
        if (doc.exists) {
            var data = doc.data();
            isUpdatingFromDB = true;
            
            // Cargar sueldo
            var sueldoInput = document.getElementById('sueldoBase');
            if (sueldoInput && data.sueldo !== undefined) {
                sueldoInput.value = data.sueldo;
            }
            
            // Cargar listas
            if (data.gastos) {
                var gastosContainer = document.getElementById('listaGastos');
                if (gastosContainer) {
                    gastosContainer.innerHTML = '';
                    data.gastos.forEach(function(item) {
                        createItemElement('gastos', item, true);
                    });
                }
            }
            
            if (data.ahorros) {
                var ahorrosContainer = document.getElementById('listaAhorros');
                if (ahorrosContainer) {
                    ahorrosContainer.innerHTML = '';
                    data.ahorros.forEach(function(item) {
                        createItemElement('ahorros', item, true);
                    });
                }
            }
            
            calculateTotals();
            isUpdatingFromDB = false;
            updateStatus('✅ Sincronizado', 'success');
            
        } else {
            console.log('📄 Documento no existe');
            updateStatus('📝 Nuevo documento - Comienza a agregar', 'warning');
        }
    }, function(error) {
        console.error('❌ Error de sincronización:', error);
        updateStatus('❌ Error de conexión: ' + error.message, 'error');
    });
}

// ==========================================
// FUNCIONES DE UI
// ==========================================
function updateStatus(text, type) {
    var statusEl = document.getElementById('syncStatus');
    if (statusEl) {
        statusEl.textContent = text;
        statusEl.className = 'status ' + type;
    }
}

function addItem(type) {
    var container = document.getElementById(type === 'gastos' ? 'listaGastos' : 'listaAhorros');
    if (!container) return;
    
    // Remover mensaje de vacío si existe
    if (container.querySelector('.empty')) {
        container.innerHTML = '';
    }
    
    var div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = 
        '<span>' + (type === 'gastos' ? '💸' : '🎯') + '</span>' +
        '<input type="text" class="inp-nom" placeholder="Nombre" style="flex:2">' +
        '<input type="number" class="inp-mon" placeholder="0" style="flex:1" oninput="onUserInput()">' +
        '<button onclick="this.parentElement.remove(); onUserInput()" style="background:#ef4444;padding:5px 10px;">✕</button>';
    
    // Agregar event listeners
    var nameInput = div.querySelector('.inp-nom');
    if (nameInput) {
        nameInput.addEventListener('input', onUserInput);
    }
    
    container.appendChild(div);
    onUserInput();
}

function createItemElement(type, data, fromDB) {
    var container = document.getElementById(type === 'gastos' ? 'listaGastos' : 'listaAhorros');
    if (!container) return;
    
    var div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = 
        '<span>' + (type === 'gastos' ? '💸' : '🎯') + '</span>' +
        '<input type="text" class="inp-nom" value="' + (data.nombre || '') + '" style="flex:2"' + (fromDB ? '' : ' oninput="onUserInput()"') + '>' +
        '<input type="number" class="inp-mon" value="' + (data.monto || '') + '" style="flex:1"' + (fromDB ? '' : ' oninput="onUserInput()"') + '>' +
        '<button onclick="this.parentElement.remove(); onUserInput()" style="background:#ef4444;padding:5px 10px;">✕</button>';
    
    if (!fromDB) {
        var nameInput = div.querySelector('.inp-nom');
        if (nameInput) {
            nameInput.addEventListener('input', onUserInput);
        }
    }
    
    container.appendChild(div);
}

function onUserInput() {
    if (isUpdatingFromDB) return;
    
    calculateTotals();
    updateStatus('⏳ Guardando...', 'warning');
    
    clearTimeout(saveTimeout);
    saveTimeout = setTimeout(saveToFirestore, 800);
}

function calculateTotals() {
    var sueldoInput = document.getElementById('sueldoBase');
    var sueldo = sueldoInput ? parseFloat(sueldoInput.value) || 0 : 0;
    
    var totalGastos = 0;
    var totalAhorros = 0;
    
    document.querySelectorAll('#listaGastos .inp-mon').forEach(function(input) {
        totalGastos += parseFloat(input.value) || 0;
    });
    
    document.querySelectorAll('#listaAhorros .inp-mon').forEach(function(input) {
        totalAhorros += parseFloat(input.value) || 0;
    });
    
    var disponible = sueldo - totalGastos - totalAhorros;
    
    var dispEl = document.getElementById('resDisponible');
    if (dispEl) {
        dispEl.textContent = '$ ' + disponible.toLocaleString();
        dispEl.style.color = disponible < 0 ? '#f43f5e' : '#22c55e';
    }
}

function saveToFirestore() {
    var sueldoInput = document.getElementById('sueldoBase');
    var sueldo = sueldoInput ? parseFloat(sueldoInput.value) || 0 : 0;
    
    var gastos = [];
    document.querySelectorAll('#listaGastos .item').forEach(function(row) {
        var nombre = row.querySelector('.inp-nom');
        var monto = row.querySelector('.inp-mon');
        if (nombre && monto) {
            gastos.push({
                nombre: nombre.value,
                monto: parseFloat(monto.value) || 0
            });
        }
    });
    
    var ahorros = [];
    document.querySelectorAll('#listaAhorros .item').forEach(function(row) {
        var nombre = row.querySelector('.inp-nom');
        var monto = row.querySelector('.inp-mon');
        if (nombre && monto) {
            ahorros.push({
                nombre: nombre.value,
                monto: parseFloat(monto.value) || 0
            });
        }
    });
    
    var data = {
        sueldo: sueldo,
        gastos: gastos,
        ahorros: ahorros,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    };
    
    docRef.set(data, { merge: true })
        .then(function() {
            console.log('✅ Datos guardados');
            updateStatus('✅ Guardado', 'success');
            setTimeout(function() {
                updateStatus('✅ Sincronizado', 'success');
            }, 1000);
        })
        .catch(function(error) {
            console.error('❌ Error al guardar:', error);
            updateStatus('❌ Error: ' + error.message, 'error');
        });
}

// ==========================================
// INICIALIZAR
// ==========================================
window.addEventListener('DOMContentLoaded', function() {
    console.log('🚀 Smart Budget Pro iniciado');
    setupSync();
});
</script>

</body>
</html>
