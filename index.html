<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Budget Pro | Full Suite</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --accent: #f43f5e;
            --bg-dark: #0b0e14;
            --card-bg: rgba(30, 41, 59, 0.6);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
            --transition: all 0.3s ease;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at top right, rgba(99, 102, 241, 0.1), transparent);
            color: var(--text-main);
            margin: 0;
            padding-bottom: 100px;
        }

        /* Menú Lateral (Sidebar) */
        .sidebar {
            position: fixed;
            left: -280px;
            top: 0;
            width: 250px;
            height: 100%;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            z-index: 2000;
            padding: 30px;
            transition: var(--transition);
            border-right: 1px solid var(--glass-border);
        }
        .sidebar.active { left: 0; }

        /* Banner Principal */
        .top-banner {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            padding: 40px 20px;
            border-radius: 0 0 35px 35px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .income-input-main {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            color: white;
            font-size: 2.2rem;
            font-weight: 800;
            width: 80%;
            max-width: 300px;
            padding: 10px;
            text-align: center;
            outline: none;
            margin-top: 10px;
        }

        .container {
            max-width: 600px;
            margin: -25px auto 0;
            padding: 0 20px;
        }

        /* Tarjetas de Estadísticas */
        .quick-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 24px;
            text-align: center;
        }

        /* Gráfico */
        .chart-container {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid var(--glass-border);
        }

        /* Filas de Gastos con Estilo de Línea */
        .expense-item {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 12px 15px;
            margin-bottom: 12px;
            display: grid;
            grid-template-columns: 6px 1fr auto auto 30px;
            align-items: center;
            gap: 12px;
        }

        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 6px;
            height: 35px;
            background: none;
            cursor: pointer;
            padding: 0;
        }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 10px; }

        select, .input-flat {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: white;
            border-radius: 8px;
            padding: 5px;
            outline: none;
        }

        select option { background: #1e293b; color: white; }

        /* Barra de progreso integrada */
        .row-progress {
            grid-column: 1 / -1;
            height: 3px;
            background: rgba(255,255,255,0.05);
            margin-top: 5px;
            border-radius: 5px;
        }

        /* Floating Button */
        .fab {
            position: fixed;
            bottom: 110px;
            right: 25px;
            background: var(--primary);
            width: 55px; height: 55px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.4);
            cursor: pointer;
            z-index: 1000;
        }

        /* Barra Inferior */
        .nav-bar {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
            padding: 20px;
            display: flex;
            justify-content: space-around;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <h3>Configuración</h3>
        <p onclick="toggleTheme()">🌓 Cambiar Tema</p>
        <p onclick="exportData()">📥 Exportar Datos</p>
        <hr style="opacity: 0.1">
        <p style="color: #f43f5e;" onclick="clearAll()">🗑️ Borrar Todo</p>
    </div>

    <div class="top-banner">
        <div onclick="toggleMenu()" style="position: absolute; left: 20px; top: 30px; cursor: pointer;">☰</div>
        <span style="font-size: 0.8rem; opacity: 0.8; letter-spacing: 1px;">PRESUPUESTO DISPONIBLE</span><br>
        <input type="number" class="income-input-main" value="5000" id="mainIncome">
    </div>

    <div class="container">
        <div class="quick-stats">
            <div class="stat-card">
                <small style="color: var(--text-dim)">GASTADO</small>
                <div id="totalSpent" style="font-size: 1.4rem; font-weight: 700; color: var(--accent);">$0</div>
            </div>
            <div class="stat-card">
                <small style="color: var(--text-dim)">RESTANTE</small>
                <div id="totalRemaining" style="font-size: 1.4rem; font-weight: 700; color: #10b981;">$0</div>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="budgetChart"></canvas>
        </div>

        <div id="expenseList">
            </div>
    </div>

    <div class="fab" onclick="addExpense()">+</div>

    <nav class="nav-bar">
        <div><small>Ahorro Sugerido</small><br><strong id="savingTip">$0</strong></div>
        <div><small>Meta (10%)</small><br><strong id="savingGoal">$0</strong></div>
    </nav>

    <script>
        // 1. Configuración Firebase (Reemplaza con tus datos reales)
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            projectId: "TU_PROJECT_ID",
            storageBucket: "TU_BUCKET",
        };
        // firebase.initializeApp(firebaseConfig);
        // const db = firebase.firestore();

        // 2. Lógica de Gráfico
        const ctx = document.getElementById('budgetChart').getContext('2d');
        const myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Gastado', 'Disponible'],
                datasets: [{
                    data: [0, 100],
                    backgroundColor: ['#f43f5e', '#6366f1'],
                    borderWidth: 0,
                    hoverOffset: 4
                }]
            },
            options: { cutout: '80%', plugins: { legend: { display: false } } }
        });

        // 3. Funciones de Interfaz
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        function addExpense() {
            const list = document.getElementById('expenseList');
            const div = document.createElement('div');
            div.className = 'expense-item';
            div.innerHTML = `
                <input type="color" value="#6366f1" onchange="updateColors(this)">
                <input type="text" class="input-flat" placeholder="Nombre" style="width: 100%">
                <select>
                    <option>🏠 Vivienda</option>
                    <option>🍔 Comida</option>
                    <option>🚗 Transporte</option>
                    <option>🎮 Ocio</option>
                </select>
                <input type="number" class="input-flat" value="0" style="width: 70px; color: var(--primary); font-weight: bold; text-align: right;" oninput="calculate()">
                <button style="background:transparent; border:none; color:var(--text-dim); cursor:pointer" onclick="this.parentElement.remove(); calculate();">✕</button>
                <div class="row-progress"><div style="width: 30%; height:100%; background: var(--primary); border-radius:10px;"></div></div>
            `;
            list.appendChild(div);
        }

        function calculate() {
            const income = parseFloat(document.getElementById('mainIncome').value) || 0;
            let total = 0;
            document.querySelectorAll('.expense-item input[type="number"]').forEach(input => {
                total += parseFloat(input.value) || 0;
            });

            document.getElementById('totalSpent').innerText = `$${total.toLocaleString()}`;
            document.getElementById('totalRemaining').innerText = `$${(income - total).toLocaleString()}`;
            document.getElementById('savingGoal').innerText = `$${(income * 0.1).toLocaleString()}`;
            
            // Actualizar Gráfico
            myChart.data.datasets[0].data = [total, income - total > 0 ? income - total : 0];
            myChart.update();
        }

        function updateColors(el) {
            const bar = el.parentElement.querySelector('.row-progress div');
            bar.style.background = el.value;
        }

        // Inicializar con una fila
        addExpense();
    </script>
</body>
</html>
