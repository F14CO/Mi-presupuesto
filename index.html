<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor Financiero: Deudas y Ahorros</title>
    <style>
        :root {
            --nu-purple: #820ad1;
            --nu-dark: #44066b;
            --bg-color: #f4f4f9;
            --danger: #ff4d4d;
            --success: #28a745;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: var(--nu-purple);
            margin-bottom: 30px;
        }

        /* 1. DETECCIÓN DE DISPOSITIVO (GRID) */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Dos columnas en PC */
            gap: 25px;
        }

        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr; /* Una columna en Móvil */
            }
        }

        /* Estilos de las Tarjetas */
        .card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--nu-dark);
        }

        /* Elementos de la lista */
        .item-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .item-row {
            display: flex;
            gap: 10px;
            align-items: center;
            padding: 10px;
            margin-bottom: 10px;
            background: #fff;
            border-radius: 12px;
            border: 1px solid #eee;
            border-left-width: 8px; /* Color dinámico aquí */
        }

        input {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        .input-name { flex: 2; }
        .input-amount { flex: 1; }
        .input-color { width: 40px; height: 35px; border: none; cursor: pointer; background: none; }

        /* Botones */
        .btn {
            cursor: pointer;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-add {
            background: var(--nu-purple);
            color: white;
            padding: 10px 20px;
        }

        .btn-del {
            background: #ffecec;
            color: var(--danger);
            padding: 8px 12px;
        }

        .btn:hover { opacity: 0.8; }

        /* Totales */
        .total-box {
            margin-top: auto;
            padding-top: 15px;
            text-align: right;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .summary-bar {
            background: var(--nu-dark);
            color: white;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 25px;
            text-align: center;
            font-size: 1.4rem;
        }

        .total-ahorros { color: var(--success); }
        .total-deudas { color: var(--danger); }
    </style>
</head>
<body>

<div class="container">
    <h1>Mi Control Financiero</h1>

    <!-- Resumen General -->
    <div class="summary-bar" id="resumenGeneral">
        Balance Total: $ 0
    </div>

    <div class="dashboard">
        <!-- SECCIÓN DEUDAS -->
        <section class="card">
            <div class="card-header">
                <span class="card-title">📉 Deudas</span>
                <button class="btn btn-add" onclick="addItem('deudas')">+ Agregar</button>
            </div>
            <div id="listaDeudas" class="item-list"></div>
            <div class="total-box">Total Deudas: <span id="totalDeudas" class="total-deudas">$ 0</span></div>
        </section>

        <!-- SECCIÓN AHORROS -->
        <section class="card">
            <div class="card-header">
                <span class="card-title">💰 Ahorros</span>
                <button class="btn btn-add" onclick="addItem('ahorros')">+ Agregar</button>
            </div>
            <div id="listaAhorros" class="item-list"></div>
            <div class="total-box">Total Ahorros: <span id="totalAhorros" class="total-ahorros">$ 0</span></div>
        </section>
    </div>
</div>

<script>
    // Cargar datos al iniciar
    window.onload = () => {
        const data = JSON.parse(localStorage.getItem('finanzas_data')) || { deudas: [], ahorros: [] };
        data.deudas.forEach(item => addItem('deudas', item.nombre, item.monto, item.color));
        data.ahorros.forEach(item => addItem('ahorros', item.nombre, item.monto, item.color));
        if (data.deudas.length === 0 && data.ahorros.length === 0) {
            addItem('deudas', 'Ejemplo Deuda', 0, '#ff4d4d');
            addItem('ahorros', 'Ejemplo Ahorro', 0, '#28a745');
        }
        updateCalculations();
    };

    function addItem(type, nombre = '', monto = '', color = '#820ad1') {
        const container = document.getElementById(type === 'deudas' ? 'listaDeudas' : 'listaAhorros');
        const div = document.createElement('div');
        div.className = 'item-row';
        div.style.borderLeftColor = color;

        div.innerHTML = `
            <input type="text" class="input-name" placeholder="Nombre" value="${nombre}" oninput="updateCalculations()">
            <input type="number" class="input-amount" placeholder="Monto" value="${monto}" oninput="updateCalculations()">
            <input type="color" class="input-color" value="${color}" oninput="this.parentElement.style.borderLeftColor = this.value; updateCalculations()">
            <button class="btn btn-del" onclick="this.parentElement.remove(); updateCalculations()">✕</button>
        `;
        container.appendChild(div);
    }

    function updateCalculations() {
        const deudas = calculateTotal('listaDeudas');
        const ahorros = calculateTotal('listaAhorros');
        const balance = ahorros - deudas;

        // Actualizar UI
        document.getElementById('totalDeudas').innerText = `$ ${deudas.toLocaleString('es-CO')}`;
        document.getElementById('totalAhorros').innerText = `$ ${ahorros.toLocaleString('es-CO')}`;
        document.getElementById('resumenGeneral').innerText = `Balance Neto: $ ${balance.toLocaleString('es-CO')}`;
        document.getElementById('resumenGeneral').style.background = balance >= 0 ? '#44066b' : '#721c24';

        // Guardar en LocalStorage
        saveData();
    }

    function calculateTotal(containerId) {
        const rows = document.getElementById(containerId).querySelectorAll('.item-row');
        let total = 0;
        rows.forEach(row => {
            const val = parseFloat(row.querySelector('.input-amount').value) || 0;
            total += val;
        });
        return total;
    }

    function saveData() {
        const data = {
            deudas: getItemsData('listaDeudas'),
            ahorros: getItemsData('listaAhorros')
        };
        localStorage.setItem('finanzas_data', JSON.stringify(data));
    }

    function getItemsData(containerId) {
        const rows = document.getElementById(containerId).querySelectorAll('.item-row');
        return Array.from(rows).map(row => ({
            nombre: row.querySelector('.input-name').value,
            monto: row.querySelector('.input-amount').value,
            color: row.querySelector('.input-color').value
        }));
    }
</script>

</body>
</html>
